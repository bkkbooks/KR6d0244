body:
  text: 天竺大圓覺教寺住持比丘自慶編述安居門第七安居門之制無他焉不過戒游行護物命尅期修證而已按律通制三時此約一歲為三時也今偏結夏月者以夏中方寸之地悉有虫苟無事游行踐傷物命起過招謗視餘二時為尤切焉不然豈修持惟在夏而不在餘二時哉若吾祖江陵九旬談妙玉泉一夏慈霔當時預聞而造入者蓋足徵焉今承其宗者隨處而居慎擇師友即聞即行圓破圓顯以驗夫修證之實非徒拘拘為蠢蠕之䘏也出草單出單之日或在三月初一日則方來過於太早或在四月初十日維那窘於太迫今定在四月初一日不可易也維那從公將登門戒次開頂書寫式見後令堂司行者先呈過兩班方呈住持批判云云近有本山新戒輔方落髮暮居方來大僧之上稍或有違便形唇吻本師當準律法訓之先受戒者在前坐後受戒者在後坐不問老少莫如外道癡人坐無次第如兵奴之法我佛法中若不如法次第坐者犯輕垢罪掛僧堂前三日皆在齋後仍備卓子上列筆硯或有差悞請自改正蓋防初上簿時恐有錯亂故也三日後依次上牌並自各認本名戒次高下不可越次亂法近有好爭作閙者往往恃強挾私互相塗抹上殿拖扯喧譁惱眾甚非所宜犯者擯出若果有差悞當稟維那首座覆住持處置草單式出圖帳草單既定堂司寫行道圖一依戒次鉢位圖修懺圖以戒次分上下堂講位圖倣於名字以講帙共者從類排之惟鉢位圖當排西堂首座大名字為板頭排訖於安居前一日張道圖於殿上張鉢位圖於外僧堂講懺前一日講圖張于法堂懺圖張于懺殿並列香燭几案於前令堂司行者報眾眾搭衣看圖認位啟沙水安居將屆宜於前幾日往來行禮云拜白安居近時多制了奔競往來甚違禁足之制十四日早堂司行者掛呪沙水牌是日粥罷鳴鐘集眾登殿依位立首座舉南無過去正法明如來眾念云云後堂首座啟白祈禱如缺後堂則懺首詞云舉大悲呪行道立定呪畢亟稱南無觀世音菩薩十聲維那回向如常普回向但後改云加持沙水有大功能有大力用如斯祈扣決望冥加再亟稱菩薩號十聲十方三世云云齋罷鳴鐘集眾誦呪舉號回向如上但不啟白次日二時第三日粥罷一時誦呪回向亦如之齋罷結制結制十六日浴頭齋罷早開浴諸殿堂然香點燭維那寫安居詞句式見後令堂司行者貼於佛殿左右柱上即覆住持兩班鳴廓板畢鳴僧堂前鐘集眾各備坐具香合登殿復舉南無過去正法明如來云云前堂詞語祈禱舉呪眾中少者四人散洒沙水差二僕挑燈行者鳴引引眾住持領眾右旋於諸天前行香東出巡廓至諸殿堂燒香立定呪歇舉號維那回向式如後再舉呪轉西廊入大殿行道一匝立定呪畢舉號維那回向如常式畢復舉南無本師釋迦牟尼佛展坐具三拜就跪住持朝首座白安居詞語三遍云云次首座朝住持白三遍次左首大眾白三遍次右首大眾白三遍畢住持云作法成否首座答云成收坐具若依律文兩兩對首行羯磨法堂司行者喝云大眾就祖堂禮拜祖師首座舉云南無旋陀羅尼菩薩行者鳴引眾至祖殿燒香一匝立定禮二拜又舉云諸祖四依菩薩禮一拜畢收具堂司行者喝云方丈和尚兩班耆舊大眾就法堂團拜住持領眾至法堂圍繞住持與首座對首立定住持白云云大眾普同觸禮一拜起問訊堂司行者喝云兩班耆舊大眾即今詣方丈禮賀首座領大眾詣方丈先首座插香次知事插香同兩班人事次耆舊後江湖大眾參頭各插香賀畢而退次小師等禮拜次侍者禮拜首座復領大眾至庫司行禮大眾同詣頭首寮行禮住持次第巡寮迎接如入院儀次知事詣頭首寮行禮兩班同報諸寮禮安居詞句大德一心念我比丘某甲今依某教寺僧伽藍大界內前三月夏安居房舍破修治故光句記云依佛法一歲三時以四月為一時則沒秋時律中有三種安居謂前中後也四月十六日是前安居十七日以去至五月十五日名中安居五月十六日是後安居若四月十六日結者至七月十五日夜分盡名夏竟是前三月是若不沒秋中後安居不名坐夏以後安居至八月十五方解故諸殿堂回向式土地明之曰靈神之曰聖神明既昭昭而不昧感應則念念以無差仰冀聖慈俯回昭監我此某寺以朱明屆炎炎帝臨司乃慈尊禁足之辰是釋子護生之日九旬辨道克期破障以成功一夏安居祈賴神司而呵護由是恭集大眾云云伏願宗風益振挽回列祖之玄猷慧日長輝不斷後世之佛種山門肅穆海眾安寧檀信歸從法輪常轉十方三世一切云云韋天藩屏佛化蓋本證之以深保障山門示大權而利益仰冀云云時維首夏將事安居欲理中外無魔須假進脩有序云云伏願道場鎮山嶽之固教海源河漢之長三學與隆四檀成集公私並秦火盜双沉云云監齋奧者宰一寺之封疆竈者典眾人之喉舌威靈有正正直無私云云茲以薰風拂拂適當結制之辰杲日炎炎正是安居之節法輪當運食輪為先欲令香積之充餘須藉神祇之匡護云云伏願晨炊夕㸑無徒薪曲突之憂齋鼓粥魚有法喜神悅之味僧堂三日茶湯禮結解二制並同都寺特為住持首座大眾湯請結制禮罷都寺懷香詣方丈觸禮一拜請云今晚就雲堂特為和尚首座大眾點湯伏望慈悲特垂光降仍具湯榜見後帶客頭行者備柈袱爐燭詣前堂首座寮插香觸禮一拜稟請如前云云以榜呈納首座即令本領茶頭遞付供頭貼僧堂前下間庫司仍令客頭請次頭首諸耆舊并掛點湯牌於內僧堂上下間各排香几爐袱外堂亦須對聖僧厨直排大香爐花瓶於聖僧厨邊設首座特位與住持對面差侍者直特位各板湯具至晚堂司行者鳴廊板各三下大眾歸鉢位次頭首入最後首座入各歸本位鳴鐘三下打板三通都寺入即揖首座歸特位仍揖後堂首座補前堂位如缺後堂就揖次頭首進板首從聖僧厨後右出於內堂門邊立聞鐘一下出迎住持入堂大眾起立住持略問訊不燒香歸位都寺進前問訊揖坐轉身歸中立問訊眾坐進聖僧前燒香次上下間各燒香出外堂燒香回厨前安香合至特位前問訊厨後轉至住持前問訊巡堂一匝及外堂歸堂中問訊側立又鳴鐘一下先進住持首座特為湯都寺至住持首座前揖湯仍從聖僧厨後轉又鳴鐘一下行大眾盞又鳴鐘一下大眾湯候行湯將畢都寺如前從前堂板頭起巡堂一匝出外堂畢行者先收住持盞都寺進住持前問訊初展云茲者聊備粗湯伏承和尚降重下情不勝威激之至二展云敘寒溫三觸禮住持不答都寺送住持出歸厨前轉左立首座從厨後右出問訊謝湯都寺送出復歸中燒香仍上下間問訊退鳴鐘一下收盞下堂鐘三下清規榜維那預寫榜呈方丈僉押或十六日或十七日讀讀畢張掛僧堂前三日堂司行者杠之十六日齋時折鉢水出知客起燒香中立讀榜安居眾法夫司南之車本指迷者照瞻之鏡元監邪人無邪則鏡何所施不迷則車何所用其遊方之士德學是求豈俟小懲然後能䇿但後生罔識於己解行事同公役今不獲已須行嚴訓於坐制日準國清百錄及天竺眾制略示條件九旬禁足辨道是謀講懺禪誦靡遑食息豈應疎散浪有出入於三月內例不與假除父母師長不幸緣故仍須堂司保明指日開給如不遵約束及託緣不實擅自出入者不許共住晨懺晝講誦經習讀說戒並教苑常規諸方通式況當夏制尤宜篤行今除山門知掌局務及病緣給假水無論徒第耆舊並須起眾飽食爛眠軃避眾法虗消信施深為不可請維那於眾集時依次第排列有不至者抄名罸香五兩鳴椎懺謝再犯倍罰二犯不共住其赴眾不及時後至者罸香三兩中間潛去者罸香三兩齋粥二時宜須早赴木魚既鳴不許入堂及展鉢作聲匙箸墮地含食笑語食畢先起違者罸香五兩眾中儀矩貴在莊肅非特己事亦生他善凡眾集處不許接對戲笑及出廊下不得臂擐手巾把手驟行有乖威儀違者罸香五兩齋粥二時除有病緣打給外餘並不許亦不得僧堂前私自盛貯違者重罸凡在寮舍不問勤舊當以禪寂看誦為事不得私著僧俗等客宿食及茹葷飲酒犯者不共住一服飾禮儀自合如法往來廊下須塔袈裟齋中不得露白違者罸香五兩新學之士須秉志肅恭親附在上授書熟誦請益義理其在上者當示規矩拘以日課以待中夏挑試通賞塞罸僧名和合忍辱義讓不許諍計抗聲厲色兩競者各罰三七拜對眾懺謝被罵不應者免身手相交不問輕重並不共住被打不動手者免齋舍不許更互止宿犯者不共住彈琴奕碁哥唱吟詠諸雜鄙事寔妨道業皆不應為違者罸七拜作匿名書者寮得實不共住不守律儀竊盜等事犯者準清規行已上條件宜各遵行夫高翥者何患於虞羅潛淵者寧畏於筌網藉緣進道得益良多依眾立身宜須保護請堂司遵行毋使有違自貼後悔今月日示方丈花押住持特為首座大眾茶第二日請客侍者具茶榜見後備柈袱鑪燭帶方丈茶頭捧之詣首座寮炷香觸禮請云堂頭和尚今晨齋退就雲堂點茶特為伏望降重以榜呈納貼僧堂前上間客頭行者請諸頭首知事耆舊掛點茶牌齋時長板鳴請客侍者入堂請僧前燒香一炷左轉身大展三拜巡堂一匝請茶仍出外堂上下間問訊轉入聖僧前問訊而退候行者下堂堂中仍設首座特位對住持位即鳴諸寮板三下大眾入堂鳴茶鼓燒香侍者行禮並與都寺特為湯禮同但不揖住持首座至住持前謝茶初展云某茲蒙煎點特此拜謝下情不勝感激二展云即日孟夏云云三觸禮三拜住持答一拜首座轉身從聖僧後右出住持略送復位執盞侍者燒光伴香上下間問訊鳴鐘一下收大眾盞鳴鐘三下眾下堂前堂特為住持後堂大眾茶第三日首座詣方丈請茶仍具茶狀見後詣後堂首座請茶如缺後堂則請懺首行禮次第大略同前但不燒光伴香異耳可漏子狀請後堂首座大眾前堂首座比丘某謹封住持兩班點行堂茶結解並同結制住持僧堂點茶罷侍者同客頭至行堂點茶客頭預報參頭掛點茶牌報眾請典座光伴燒湯出盞方丈預送茶侍者至庫司典座接入參頭堂主領眾門迎侍者代住持居主位典座分手侍者出中燒香復位以手揖眾坐喫茶畢典座送出參頭堂主門送即詣方丈謝茶庫司候方丈點茶羅知事至行堂點茶知事居主位典座分手行禮與方丈侍者同送出門喝云參頭大眾詣庫司謝茶庫司茶頭報云知事傳語免謝茶頭首僧堂點茶罷令堂司行者報參頭掛牌報眾請典座光伴行禮與庫司同出門唱謝唱免亦同直日須知維那於結制前預置條冊一本審定闍梨多少依其戒次從下至上三日一輪周而復始以日逐規矩書之於前以直日各名列之於後維那賷詣方丈批判初令堂司行者送至直日人齋中至第三日晚諷誦畢賷須知冊塔衣送至次直日人齋中至三日滿展轉遞送所有條章並見於後直日人在侍者班末立須知式公輸雖巧不舍規矩方圓新學遊方須學叢林儀範斯乃出眾之鴻漸入道之初門直乎三日始終毋得託緣推故今將日用規矩具陳于後晨朝大殿諷誦候鳴殿鐘同侍者歸班立鐘絕鳴引二下首座畢呪約誦呪四五句鳴引二下行道畢立定鳴引二下頭首舉號鳴引一下眾和三聲畢鳴引一下餘號例前維那回向至十方三世一切諸佛鳴引一下一切菩薩摩訶薩鳴引一下摩訶般若波羅蜜鳴引二下引眾赴堂修懺候鳴懺殿鐘歸直日位立鐘絕鳴引二下至懺悔發願畢拜起鳴引二下主修舉唱佛號每聲鳴引一下至稱南無十方僧畢即轉身朝主修問訊徐徐前行繞稱佛菩薩名各鳴引一下候佛號三遍將畢立定鳴引二下舉三歸依至和南聖眾拜起鳴引二下舉阿彌陀佛真