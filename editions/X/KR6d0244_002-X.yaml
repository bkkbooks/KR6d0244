椎擊之聲振大千音中亦說諸佛教誡弟子法此磬梵天造及佛滅後娑竭龍王收歸海中增輝記云命未終時長打磬令其聞聲發其善思得生善處大師臨終語維那曰大命終時得聞鐘磬增其正念惟長惟久勿令聲絕以氣盡為期故今名為打無常鐘無常磬是也鐃鈸凡維那揖住持兩序出班上香時藏殿祝贊轉輪時行者鳴之遇送亡時侍者披剃大眾行道接新住持入院時皆鳴之通典云銅鈸其圓數寸隱起如浮漚貫之以韋相擊以和樂也南蠻國大者圖數尺鐃者鐃聲鐃鐃也鼓法鼓凡住持開講上堂及頭首開講並擊三通每通三椎九擂先輕敲鼓磉三下然後重手徐徐擊之二人相顧使其繫緩輕重相參相應音聲和暢起復連環隱隱轟轟若春雷之震蟄似海潮之發音第一通延聲長擊少歇轉第二通連聲稍伇更不歇聲就轉第三通候住持登座時一級一下待座上轉身雙椎連打三下普說繫念並一通茶鼓長擊一通侍司主之齋粥二時鳴鼓各有前後三通前三通起九下中間每通十下結三下應鐘一聲後三通起九下至第二下應鐘半聲中間三通每訖各應鐘一聲結三下鐘同應三下普請鼓長擊一通更鼓早晚平擊三通餘隨更次擊之庫司主之浴鼓四通次第候眾擊之詳見如知浴門知浴主之僧祇律云帝釋有三鼓若善法堂說法時則打第三鼓光明句云擊鼓誡進肅眾前驅譬佛說法進深行也已上法器宜各有常度毋令失准若新住持入院則諸山器一齊俱鳴夫法器之名梵語總稱為犍稚音地聲論翻磬亦翻鐘五分律云隨有瓦木銅鐵鳴者皆名犍椎若迦葉結集檛銅犍稚此是鐘也若阿難升講堂擊犍稚者此是如來信鼓也故叢林倣其制而用之所以申號命警昏蒙也若夫大定常應大用常寂達聲非聲不聞而聞根塵泯淨任運常然是為絕侍者不可思議之音聞也法器門第十洪武兩子秋七月僧錄司右善世前住慈感講寺釋紹宗募緣重刊左善世前住北禪講寺釋大佑勸緣助刊左闡教天禧講寺住持釋溥洽勸緣助刊上天竺講寺住持如蘭助緣書教苑清規後明僧一如銜使本寄此書於廬山寺中菴從此相傳而人未徧知余向在武城偶得一覽而謂虗張浪設傚於禪林之規夜噉昏餐違於覺王之制豈足以匡吾徒也哉雖然取其可取捨其可捨則此書之行不無小補頃有欲鏤于梓者來求一辭因書鄙懷以附其後云貞享元年九月日南谿沙門光謙謹書
