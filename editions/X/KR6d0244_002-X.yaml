下三稱鳴椎一下如法受籌并受囑授人籌僧眾若少但秉白授籌小者收籌僧眾若廣分籌為二作上下堂行之秉白至聖僧住持前小跪各授一籌住持雙手受之或同眾展具跪受或坐受誦受籌偈云金剛無礙解脫籌難得難遇如今果我今頂戴歡喜受一切眾生亦如是收護人亦至僧前住持前小跪双手接籌住持誦還籌偈云具足清淨受此籌具足清淨還此籌堅固喜捨無缺犯一切眾生亦如是秉白次第循行上堂分籌眾各受籌誦受籌偈云云如有事緣及病者不來聽戒當預書双字名與受欲人說淨其受欲人則記不來者受若干籌收護人次第收籌眾各還籌誦還籌偈云云其下堂二人授籌亦然行畢同至爐前蒲團上胡跪互受籌還籌了起身秉白至椎所三人隨至排立於後若秉白自行籌但留小者收籌餘者復位鳴椎一下唱云次行沙彌籌三稱白云行沙彌籌每二人各從後板入行沙彌籌畢至法座後數籌二人先出復位收護一人捧籌右出繞大爐轉至住持前胡跪上籌白云大僧幾員少彌幾無人起問訊左入法座前轉右出歸位秉白徐至住持前跪住持授籌云大僧幾員沙彌幾無人秉白受籌繞法座前右轉歸椎所鳴椎一下唱云大德僧聽此住處一布薩大僧幾員沙彌幾無人都合幾人各於佛法中清淨出家和合布薩上願佛教中報四恩下為含識鳴椎一下白云大眾各念律中清淨妙偈眾皆合掌誦云清淨如滿月淨清得布薩身口業清淨爾乃應布薩六請戒師秉白至爐前安籌一拜收具詣住持前展具一拜胡跪云上座慈悲為眾說戒住持云此說戒事坐次合當但以言詞濁鈍恐惱於僧眾中有某申律師精誦毗尼往彼告云僧差說戒秉白收具起問訊繞法座前轉至戒師前小問訊低聲云僧差說戒至梵師前亦低聲云大德梵音梵師戒師亦合掌坐而受之秉白至椎所鳴椎一下唱云大悳僧聽僧差某甲律師為眾說戒梵音某甲律師陞高座說戒人聞僧差二字即起身至爐前問訊燒香禮三拜秉白戒師須相瞻聽緩急聲絕拜畢拜畢胡跪唱絕鳴椎一下戒師白云小比丘某甲稽首和南敬白大眾僧差說戒恐有錯護願同誦者指授收具起立問訊詣聖僧住持前各問訊又普問訊上堂大眾退至右邊普問訊下堂大眾入至座下問訊登座燒香問訊趺坐七散花作梵行事四人起身歸爐前元處同問訊二人進前小問訊跪下取花柈復位次二人進前問訊跪執水盂復位同問訊從東首散洒繞座前一匝秉白鳴椎一下白云散花說偈大眾同聲誦云散花莊嚴淨光明莊嚴寶花以為帳散眾寶華遍十方供養一切諸如來眾皆合掌梵師白云稽首禮諸佛及法比丘僧今演毗尼法令正法久住梵音云優波離為首及餘身證者今說戒要義諸賢咸共聽散洒人歸座前一行立問訊進前轉身相朝胡跪併花為一盤合水為一盂置於花柈上一人捧之起身平立問訊三人歸位捧柈者先面西逆行洒水散花填於中間須待聽梵音不緩不急行之梵音將畢然後結四方畢至爐前問訊進跪置柈歸位八請說戒秉白候梵音畢鳴椎一下行事一人起至爐前敷具禮三拜就胡跪執手爐白云傳香說偈律師亦三上香眾合掌誦云戒香一上香定香二上解脫香三上光明雲臺遍法界供養十方無量佛見聞普熏證寂滅然香人收具問訊歸位直日鳴引一下大眾合掌沙彌則出大界相外戒師執手爐誦四分戒本序從首偈誦至半月半月說直日鳴引一下戒師放手爐住持叉手揖眾眾皆叉手揖謝住持秉法首座答法問僧集否答僧已集問和合否答和合問未受具戒者出答若有則云未受具戒已出無則云此眾無未受具戒者問不來諸比丘說欲及清淨說欲者展具胡跪合掌白云若有則云大德僧聽彼比丘某甲某甲我受彼欲清淨彼如法僧事與欲清淨言某甲處稱彼諱名一說收具復位如無則云此眾無說欲及清淨者答如有則云說欲及清淨已如無亦云此眾無說欲及清淨者問誰遣比丘尼來請教誡答此眾無尼來請教誡問僧今和合何所作為答單白和僧說戒羯磨住持云單白和僧說戒結磨大德僧聽今白黑月十四五日眾僧說戒若僧時到僧忍聽和合說戒白如是作法成不答成或有一字落誤則云不成當重作住持云作法既成高座說戒戒師即誦戒字後七佛略戒鳴僧堂前鐘三下召沙彌入堂無沙彌則不鳴鍾誦至我雖般涅槃當視如世尊秉白先起身就本位禮三拜歸椎所立九再唱梵師下座梵音師候座上誦戒畢唱神仙梵云神仙五通神造設諸呪術為彼慚愧者揖諸不慚愧如來立禁戒半月半月說已說戒利益稽首禮諸佛處世界如虗空如蓮華不著水心清淨超於彼稽首禮無上尊戒師下座至大爐前燒香禮三拜梵師戒師互相瞻聽梵音終時拜亦同竟拜起就胡跪秉白鳴椎一下戒師白云小比丘某甲致敬眾僧足下敬謝眾僧僧差說戒三業不懃多有忘失願僧慈悲施以歡喜收具起問訊歸元位十皈依三寶鳴椎一下眾敷具秉白唱三皈依自歸依佛當願眾生體解大道發無上心鳴引大眾一拜鳴椎下同一自歸依法當願眾生深入經藏智慧如海自歸依僧當願眾生云云上來布薩無限良因散沾沙界和南聖眾眾拜起就胡跪同念自慶偈云諸佛出世第一快聞法奉行安穩快大眾和合寂滅快眾生離苦解脫快收具起若申時說戒即施生如常式直日鳴引二下引眾出堂大眾依上下堂次從小者先出兩兩並行徐徐鳴引引至僧堂前舊處眾立定堂司行者鳴僧堂前鐘三下眾同問訊而散梵語布薩此云淨住南山云淨身口意依戒而住毗奈耶云意令半月半月憶所犯事對無犯人說露冀改前𠍴一則遮現在之更為二則懲未來之慢法故四分謂若說戒日無能誦者當如布薩法行籌告白差一人說法誦經夫行籌者謂知僧數又十誦云為檀起問僧不知數佛令行籌不知沙彌數行籌數之若人施布薩物沙彌亦得雖不往布薩羯磨處由受籌故四分為受供行籌通沙彌也若未受十戒亦得受籌以同受供故梵語羯磨天台禪門翻為作法又指歸云羯磨此云業如俗之四民各有其業僧以說戒等事為業故南山引明了論疏翻為業也所作是業亦翻所作百論云事也若以義求翻為辨事謂施造遂法必有成濟之功焉秉白梵音聲圖梵唄者讚詠之音也梵云唄匿華言止斷也由是外事已止也斷爾時寂靜任為法事又云諸天聞唄心則歡喜故須作之長阿含經云其梵聲有五種一者其音正直二和雅三清徹四深滿五周遍遠聞都講頭首開講此土根性從聲入理理本無說理由說彰五種法師解說為最法不孤起理應勸請住持開講三五日後先令侍者至前堂寮稟云方丈和尚拜屈首座講領眾就法堂拜請都講開講次詣都講寮稟云和尚拜請都講和尚為眾開講若次頭首則無此禮當日住持講畢白云云煩首座領眾請都講開講請次頭首同白訖即令聽呌行者送香至首座前首座伺住持下座出即就領眾法堂爐前左立請都講右立首座插香問訊云即日恭惟都講大法師尊候起居多福茲奉方丈慈命拜請為眾講演伏望尊慈云云都講答云自揣疎謬何以尅當下情云云請後過二三日預委令行者敷設法座等前一日晚令堂司行者覆住持兩班諸寮仍掛開講牌報眾另貼都講二字并其文某科於牌上至日粥罷下堂後鳴鐘四下方丈預令行者請講人點心就留方丈寢堂分坐堂司行者次第覆打起鳴廊板鳴僧堂前鐘及大鐘鳴皷至三通住持講人俱乘輿至法堂住持歸左首所設位立講人燒香禮三拜問訊至住持前問訊謂借座也次問訊上下間大眾從右邊入至座前歸中小問訊上座亦右入几燒香問訊略坐候住持起身即起身退右邊立住持燒香點燭同問訊住持歸位即坐次兩序次耆舊次江湖次大眾次第炷香點燭各班首亦預率錢市香燭參講問訊畢各歸位講人趺坐鳴槌一下執拂揖眾答揖提綱敘謝結座下座至爐前普問訊歸寮即懷香詣方丈拜謝堂司行者通報詣庫司頭首耆舊諸寮各齋相謝次日就本寮候皷鳴至法堂燒香不設拜登座舉戒香偈云云回向云云展卷云云餘頭首開講同維那點讀為學之要先讀四書四書旨趣深廣難窮本宗維那亦非聊爾是宜勸請亦同前禮知客領眾座前致請隨於一書撮其英發其奧緝以成章為學者敷演名曰點讀一應出處與開講同但不拜不登座不鳴皷不鳴椎就座下於中設位隔宿堂司行者覆住持兩班諸寮掛牌報眾次早覆打起鳴廊板各三下鳴大板三通以代法鼓維那燒香入位住持等次第炷香點燭問訊畢提綱敘謝結座行謝禮並與頭首開講同後二日坐定鳴尺二下云稽首天台教主佛隴禪師惟願他心道眼無礙見聞冥勳加被南無旋陀羅尼菩薩眾和三聲執拂子揖眾舉語云云結語畢即起三科習讀古德講貫歲無虗日今教法衰微德業浸廢學者見聞既寡名位皇皇故夏安居講次習讀以勉勵才能䇿勳後進儻茲奪志不息佛種慧命殆庶幾焉將舉習讀住持令侍者於三五日前備紙詣各齋與三科名一覆講科大剎知客侍者甲剎維那久住闍梨皆與焉二開科科闍梨誦文已畢能看讀者與之三誦文科初學闍梨本山新戒與之與名畢將日子具呈方丈僉押免有進退至習讀日令堂司行者掛習讀牌住持講畢歸方丈侍者至住持前作三科鬮鬮寫某齋其人貯三合中封記預令法堂座前中設住持位仍備書燈香爐燭臺至參後諷誦施生畢住持歸方丈或歇諷誦直日詣侍司侍者覆住持令直日鳴僧堂前鐘候鐘鳴一十餘下挑燈起轎至法堂略問訊徑入中位而坐不欲驚眾故也眾不起身行者捧三科合并講帙靜尺於卓上直日至前問訊鳴引二下知客令行者點大眾湯湯畢住持鳴尺二下大眾展卷詳緩看閱片時再鳴尺二下侍者與直日至住持前問訊取覆講鬮合對住持開封住持拈一鬮付侍者展開呈住持付直日高聲云某齋某覆講拈第二名亦如之覆講之法應覆住持當日所講之義不得別有異議過於穿鑿若果有發明符合文旨則無在也覆講畢侍者直日再至住持前取開科鬮合開封如前付直日白云某齋某論師開科拈第二名亦然開科者乃開住持次日所講之文須預於請益師處講明文義點對句讀及收開等法毋致臨時猖蹶也開科畢侍者同直日又至住持前取誦文鬮合如前拈付直日偈云某齋某上人誦文或二人或三人不拘誦文者雙手捧文帙至爐前問訊從在入至住持前問訊置文帙於住持前再問訊至直日位下坐則誦所習之文須言詞精熟詳緩合宜起盡可聽者賞紙筆等如所誦稍長住持或挑試接誦不輟則卓上彈指止之誦文者住聲起身至住持前問訊取所誦文回元處坐其次並同誦文畢鳴引二下住持先出兩班大眾就到三科人各齋作賀次日三科人詣方丈庫司頭首諸寮各齋謝禮十剎維那不預覆講必須新學說文科目之式鎖試古來講罷之後行鎻試法勘辨人才䇿其未進如烹金爐鈆水不存如治玉斧碔砆盡去住持令侍者於四五日前備紙抄覆講開科人泊名勝拔萃之士欲預斯選者同具呈方丈僉押免有進退擇一靜處開設絳幃於中設大師像敷陳供儀仍排椅卓廣安四書大小部文以備撿尋侍者先一日排位次圖於幃外令堂司行者排鎖試牌請見職頭首全班見職都寺一人又請名德西堂首座二人東序尊宿耆舊二人來日就某處證明鎖試至日粥罷堂司行者報預科人員各認圖位入位不許懷帶消文私葉委監寺一人巡警閑人毋得擅入喧雜掛靜牌眾集已各人燒香候住持至領眾對像排立住持進前燒香同禮九拜稱南無旋陀羅尼菩薩禮畢各依位坐侍者當中問訊燒香令茶頭行者行茶訖侍者進紙筆請住持出題目或就講次文中難辭或就諸部祖文疑難處試問二章其詞務在語簡意顯侍者抄寫於二章中難辭文義深遠者送覆講人開科者次之預科之人仍各備筆墨紙硯當思部味教觀援引諸文一一伸答須在理當不尚詞長卷子式如後若欲淨手俱在近便一處不許託緣歸齋問請益師如文出他人量宜罰之方丈分付庫司半齋備點心并午飯皆就筵齋客司點茶斯在浴前各要封號齋名雙諱納卷子朝大師像問訊住持前問訊而退侍者寫卷子數目若干道携至方丈交與衣鉢侍者收受住持次日看卷批判取其優劣若說義純正深於理致者則當稱賞之擬擢職事或言詞疎謬答不稱問者當以誡勗若他白者示以彈訶批判之後衣鉢侍者照依元數交與燒香侍者當置一冊子發號抄寫住持批判詞語畢請與科人俱至侍司眼同開封見雙字諱名分曉對批判各人卷子寫名字於冊中仍携卷子呈覆住持於茲方見各人平日看讀工夫有淺深也鎖試之法廢久不行今姑存之俟有作興者昔四明尊者有絳幃問答三十章試問四十二章如教行錄其略云褰絳幃問諸子其詞惟要其旨甚微俾無或者興布教之功令不敏者奪強學之志云云若誦文者或五日策文或答小難別在一日不可同混上二科也鎖試位次之圖鎖試卷式蘭盆會世徒謂以養親為孝而不知辱身辱名為不孝也世徒謂割恩愛為不孝而不知明出世道報恩為孝也始吾世尊弃位捨親取證覺果答地恩於迦維報母恩於忉利復肇蘭盆垂教將來可謂大孝也矣夫出家能如是果何媿哉不然進退兩難不孝孰大焉七月初一日啟建蘭盆會隔宿堂司行者覆方丈兩序諸寮掛牌報眾整肅懺殿敷陳供養至日早鳴懺殿鐘眾集懺首舉彌陀佛號修小彌陀懺其中歎佛偈已製詞啟白云云次日已去眾同白云我等同孝志修行淨土因報答二親恩懺除三障罪存者獲福壽亡者得超昇盡法界怨親同生安養國至三歸依畢舉阿彌陀佛真金色云云繫念彌陀佛一百聲觀音勢至清淨海眾若一十聲畢回向云以此修行眾善根報答父母劬勞德存者福樂壽無窮亡者離苦生安養四恩三有諸含識三塗八難苦眾生俱蒙悔過洗瑕班盡出輪迴生淨土十方三世云云粥罷少頃堂司行者覆打起仍就懺殿修大彌陀懺鳴懺殿鐘眾依位立定懺首舉彌陀經或蘭盆經行香行道經畢稱彌陀佛三聲展具敬禮至讚佛已繼云我等同孝志云云至逆順十心畢稱彌陀佛三聲舉懺悔文五悔文皆如補助儀但於我比丘某甲增若為存亡父母入至心懺悔等云云小彌陀懺懺悔亦然至隨喜回向畢稱阿彌陀佛四十八聲即舉發願文云云畢繼云願所生父母或今存在或已終亡隨某所居逐彼生處惟願阿彌陀佛觀世音菩薩大勢至菩薩光明照燭願力攝持三障消除五根成立發菩提願修淨土因存者得滿報齡終歸寶剎亡者即指諸趣便託蓮胎覩妙相明心聽玄談入位現前受記塵剎分身廣度有情同登妙土伏願我等孝順之心深入至道之法無遺當來諸佛會中同作應生眷屬二嚴等備三覺俱圓法性有邊願心無極盡入如來願性海中發願已歸命禮云云至三歸依畢舉蘭盆經或彌陀經行道畢不再舉讚阿彌陀佛真金色等即繫念佛號百聲菩薩號若十聲回向云以此修行眾善根云云如前齋罷覆打起鳴懺殿鐘集眾諷彌陀經或蘭盆經讚佛云云稱號佛百聲菩薩若十聲回向如前參後鳴鐘集眾諷彌陀經行道經畢讚云阿彌陀佛真金色云云繫念佛號千聲菩薩號若百聲或若十聲發願云願所生父母云云如前轉身施生如常式庫司每晚令參頭輪差行者撥扇行湯堂司行者正貼二人數牌每一十聲鳴磬一下百聲鳴引一下千聲鳴引二下一人管大數一人管小數日日如之至十五日修大彌陀懺至歎佛已主修製詞散懺堂司行者預率眾財送歸庫司營備蘭盆百味供養仍覆書記製疏書記如缺維那自製或用舊者皆無在疏式如后於齋前敷陳供養百味蘭盆務在豐潔辨己堂司行者覆打起集眾面佛立定首座舉釋迦佛號眾和同敷具三拜不收具住持上湯進食眾同三拜上茶又同三拜收具維那宣疏畢舉蘭盆經舉號釋迦彌陀觀音勢至海眾各三聲眾發願云願所生父母云云至晚施斛滿散或就懺殿前或水陸堂或山門首隨各寺例某路某寺住持比丘某與比丘眾七月十五日伏值目連大士救親之辰預於半月熏修懺法諷誦經文繫念樂聖號茲者滿散修設盂蘭盆供養常住三寶十方眾僧所集殊勛答報生身父母歷劫怨親法界含靈同生淨域者伏以乾稱父坤稱母誠覆燾之不偏佛可尊法可師謂依歸之有託諸子厄窮於塗炭至人利樂於塵凡推皇覺博濟之心物機遍赴拔青提倒縣之苦緣感斯彰教傳百世之餘時屆七月之望秋風乍起悲遊子念故鄉白雲孤飛想吾親舍其下況霜露沾濡而既降乃焄蒿悽愴以難堪生三年免于懷豈勝言者有一日用其力孰擬報乎奉蘭盆供設之飱行蓮社懺摩之法要期在昔尅志于今伏願我等多生父母歷劫怨親枯發河千尺之狂瀾不留餘滴淨性空一輪之歸月高朗重輝若沒若存常安常樂謹疏某年七月日疏解制凡二儀自恣廣儀夏罷歲終之時應舉自恣之法住持於三五日前和會前堂首座答法并上首知法二人為五德就備管待十五日晚維那請行事六人等獻湯至暮習行事十六日早直日於僧堂伺展鉢後鳴椎一下白云大德僧聽今黑月一日眾僧和合辰時就某處自恣粥罷即開浴維那令堂司行者人僕洒掃自恣處按僧數排蒲團如說戒坐位不須排登椅仍具兩蒲團安於眾僧前中間擬二五德作法處仍具香花籌水香爐燭瓶等如說戒式預備青白草若干束隨僧數多少辦之每束約二三十莖長二尺許用二箱袱置卓子上安中間兩柱前又置小几案於住持蒲團側安手爐拂子靜尺須安一蒲團在住持上肩設聖僧位已上並須維那撿點悉令齋肅時至諸殿堂然點香燈堂司行者覆打起鳴廊板鳴僧堂前鐘眾集僧堂前分作上下堂二行立鳴大鐘誦聞鐘偈云云入堂誦入堂偈云云禮三拜趺坐五人起行事及秉白詞句並如布薩儀中但秉唱時改說成二字為自恣秉白至唱籌數竟下為含識聲絕時即云各誦律中清淨妙偈眾云清淨如滿月清淨得自恣身口業清淨爾乃同自恣秉白且立椎所行事四人亦起散花洒水如說戒式秉白鳴椎一下舉散花偈眾云散花莊嚴云云畢眾皆合掌梵師作梵稽首云云畢更不用舉傳香說偈偈但只住持執手爐三捻香舉云戒香云云偈畢秉白椎一下歸位坐住持鳴尺二下執拂子叉手揖眾眾答揖住持白席云云見後繼說差人云西堂某法師為第一五德座元某法師為第二五德第一座某法師答所成法住山某謹白鳴尺二下住持首座略轉相朝住持秉法首座答法問僧集不答僧已集問和合不答和合問不來諸比丘說欲及清淨說欲人互跪云大德僧聽彼比丘某某等我受彼欲自恣彼如法僧事與欲自恣如無則云此眾無說欲及自恣者答說欲及自恣已如無則同前說欲者云無問僧今和合何所作為答單白和僧自恣羯磨住持云差受自恣人自一羯磨大眾同心證明作法詞語如羯磨經中云大德僧聽若僧時到僧忍聽僧差比丘某甲某甲作受自恣人自如是問作白成不答成住持云大德僧聽僧差比丘某某作受自恣人誰長老忍僧羞比丘某某作受自恣人者默然誰不忍者說僧已忍差比丘某某作受自恣人竟僧忍默然故是事如是持問結詞成不答成住持云作法既成二五德出眾行事二五德即收具香合問訊離位庠序而出到中間二蒲團所立定一齋問訊分兩邊行上香爐前各三捻香置香合於几案上退身兩傍出蒲團位問訊展具三拜起對坐少定二人叉手互揖第一五德云自恣單白羯磨大眾同心證明作法詞語如羯磨經中云大德僧聽今日眾僧自恣若僧時到僧忍聽和合自恣自如是問作法成不答作法成少頃行事四人出眾前排立一齊問訊每邊二人分東西而上各至草所一人擎箱一人分草聖僧前住持前當跪授之次者低身授之不可平身拋擲各各次第受草說偈云吉祥童子施軟草如來受已成正覺我等比丘學佛故坐草自恣淨三業誦畢將草舒開置坐具前地上擬一身所跪之闊其二五德草隣位先與敷之庶免臨時忽遽二箱行事兩頭行來中間結絕行草既畢放箱元處出香爐前一齊問訊歸位行事出入使有可觀二五德即轉身面佛互跪合掌第二人唱云一切僧就草座偏祖右肩胡跪合掌唱畢二五德收具起身兩傍而出第一五德至住持前展具胡跪合掌住持進前胡跪草上就草座者為懺眾人不敢在高座非成道坐草也合掌對第一五德三陳自恣詞句見後第二人徐徐至首座前展具胡跪首座進前草上胡跪三陳自恣詞句云云第一人又至首座下肩胡跪三人同進前草上胡跪同陳自恣詞句三說從是以下三人為一引同陳詞句三說先上間次下間亦如是二五德更互作對首畢亦入元位展具跪草互為對首自恣竟仍至中間蒲團位問訊如前燒香袖香合復歸中位展具禮一拜胡跪第一人唱云僧一心自恣竟收具問訊退歸本位展具畢大眾起立秉白至椎所住持執手爐回向云上來恭依律範行自恣法事所華洪因端為祝延皇帝聖壽萬安皇太后皇后齊年皇太子睿筭千秋文武官班同增祿筭國安民泰時和歲豐不盡良因祝献護法諸天報答四恩三有伽藍真宰護教安僧法界眾生同圓種智為是緣念清淨法身云云十佛號加天台大師號乃至波羅蜜梵人作處世界梵如說戒中畢鳴椎一下唱三歸依如說戒中亦須隨拜鳴椎鳴引拜起就跪眾念自慶偈如說戒中偈畢若處狹眾多收具右遶至佛前排立問訊展具立定舉釋迦佛號若自恣時一面已立了不須收具頭首舉釋迦佛號住持爐前燒香大眾禮三拜收具至祖堂禮拜收具直日鳴引持呪往土地堂諸殿堂謝安居護持之意維那回向式見后畢引至法堂團拜而散往來人事茶湯三日等禮並與結制同自恣白席白席秉差或住持或首座皆無在也圓覺伽藍統十方而無外毗尼軌範亘萬古以同遵開遮持犯則纖粟無差斷割重輕則秋毫不濫住持佛法綱紀僧倫故茲坐夏之真規嚴舉護生之聖禁蓋鹿園始制鶴樹重宣初篇雖在於擯科餘緒乃關於懺法使乘戒而俱備庶定慧以克成既扶助於圓宗當謹遵於先憲況此大方之寶剎素為台教之名藍盛演斯宗揚聖化乃育德養才之困藪實傳道解惑之源流學徒盛集於斯時師道獨尊於當代續鷲領之慧命闡龍猛之芳献游泳寂滅道場安住平等性智茲值金飈應律薦林壑之新凉玉露溥秋肅湖山之爽氣九旬之制告滿三事之道當陳利者已能光潔六根固若明珠之絕類鈍者猶恐難忘三業寧免白玉之微盡隨篇聚以懺揚悉使根塵而泯淨今將紏舉毋得覆藏當坐草以翹誠猶負荊而謝罪要須澡沃必假懺宣今請五德人舉行自恣法所言自恣者自謂自宣己罪恣謂恣他舉過所謂五德者則有二種曰自恣日舉罪不愛不恚不怖不癡不疑知自恣非自恣此是自恣五德也若曰知時不以非時如實不以虗誑利他不以揖減柔和不以麤獷慈心不以嗔恚此乃舉罪五德也今請某人為第一座五德某人為第二座五德某學疎德薄濫廁秉差祇到高明不勝皇懼謹白若首坐白席至請五德竟即云某為眾答法云云自恣詞句書二式貼於左右柱上大德一心念眾僧今日自恣我比丘某甲亦自恣若見聞疑罪大德長老哀愍故語我我若見罪當如法懺悔土地堂回向安居三月遵佛祖之典章制滿一期籍神祗之麻庇恭大眾肅詣靈祠特諷衩章稱揚聖號灼化財馬功德致謝云云合堂真宰謝已往之洪恩錫將來之吉慶山門寧靜海眾咸安三業冰清四魔殄滅公私火盜時時允賴無虞黍稷稻粱歲歲常期滿望云云韋天前回向護教流通統三洲而持未運受佛付囑輔四王而捍禦外魔仰冀云云茲以金風扇野白帝司方當覺皇解制之辰是眾僧自恣之日云云伏願山門鎮靜巍巍若九鼎之尊嚴倉庫豐盈浩浩會百川之進益警法侶正念三障消除儼梵宇美奐美輪萬祥駢集云云監齋前回向神威赫赫常行賞罰之權聖德巍巍各有司存之職云云茲者安居期滿解制當行慶一眾修道而有成賴九旬禁足而元難云云集茲殊利仰答洪麻所冀香積豐饒運食輪而常轉法音鏜鞳祈海眾以咸安湯火無虞諸緣吉慶云云自恣略儀十五日晚堂司行者覆住持兩班諸寮掛解制牌報眾十六日粥罷即開浴鳴法器集眾諸大殿如次立住持至燒香首座啟白云云畢舉釋迦號眾展具三拜就跪住持首座略轉身相胡住持作首法三白如前次首座作首法三白次上間大眾同作自恣法又下間大眾作自恣法三白竟住持問云作法成不首座答成收具舉大悲呪行道詣諸殿堂致謝回向如前復舉呪歸殿普回向致謝堂司行者喝云大眾詣祖堂禮拜法堂團拜方丈禮賀三日行茶湯等禮與結制同有處先誦呪詣殿堂後作首法者非自恣者事鈔云九旬修道精練身心人多迷己不自見過理宜仰憑清眾埀慈誨示縱宣己罪恣僧舉過內彰無私隱外顯有瑕疵身口託於他人故云自恣四分中云安居竟自恣則七月十六日為定律又云僧十四日自恣尼十五日自恣此謂相依問罪故制異日及論作法三日通用克定一期十六日定安居篇云四月十六日結者至七月十五日夜分盡訖名夏竟至明相出華鈔云諸經律中以七月十六日是比丘五分法身生養之日則七月十五日是臘除也僧不以俗年為計乃數夏臘臘接也謂新故之交接安居門第七誡勸門第八輪扁之斵非運斤則其巧不施造父之御非執轡則其善不彰是乃得之心應之手寓其神而造其妙也然後世學藝者亦不敢背其規矩而擅為焉況學法王法者乎天台一家妙解妙行其所成書無非祕藏其所思惟無非佛法至於國清百錄等書尤切於規矩準繩者也此皆得於心而應於外所以動容中規周旋中矩埀百千載不可易有不期然而然矣今之初學未造其妙欲捨規矩是學藝者之不及則將奚取法焉內省毋忽立制法出國清百錄夫新衣無孔不可補之以縷宿殖淳善不可加之以罰吾初在浮度中處金陵前入天台諸來法徒各集道業尚不須軟語勸進況立制肅之後入天台觀乎晚學如新猿馬若不控鏁日甚月增為成就故失三治一蒱鞭示恥非欲苦之今訓諸學者略示十條後若妨起應須增損眾共裁之第一夫根性不同或獨行得道或依眾解脫若依眾者當修三行一依堂坐禪二別場懺悔三知僧事此三行人三衣六物道具具足隨有一行則可容受若衣物有闕都無一行則不同止第二依堂之僧本以四時坐禪六時禮佛此為恒務禪禮十時一不可闕其別行僧行法竟三日外即應依眾十時若禮佛不及一時罰三禮對眾懺若全失一時罰十禮對眾懺若全失六時罰一次維那四時坐禪亦如是除疾礙先白知事則不罰第三六時禮佛大僧應被入眾衣衣無鱗隴若縵衣悉不得三下早集敷坐執香爐胡跪未唱誦不得誦未隨意不散語話叩頭彈指頓曳屣履起伏參差悉罰十禮對眾懺第四別行之意以在眾為緩故精進勤修四種三昧而假託道場不稱別行之意撿挍得實罰一次維那第五其知事之僧本為安立利益反作損耗割眾潤己自任恩情若非理侵一毫雖是眾用而不開白撿校得實不同止第六其二時食者若身無病病不頓臥病已差皆須出堂不得請食入眾食器聽用鐵瓦薰油二器甌椀匙筯悉不得以骨角竹木瓢染皮蚌悉不得上堂又不得摚觸己鉢吸啜等聲含食語話自為求索私將醬菜眾中獨噉犯者罰三禮對眾懺第七其大僧小戒近行遠行寺內寺外悉不得盜噉魚肉辛酒非時而食察得實不同止除病危篤瞻病用醫語出寺外投治則不罰第八僧名和合柔忍故和義讓故合不得諍計高聲醜言動色兩競者各罰三十拜對眾懺不應對者不罰身手互相加者不問輕重皆不同止不動手者不罰第九若犯重者依律治若橫相誣被誣者不罰作誣者不同止若學未入眾時過眾主不受學眾未攝故彼自言比丘故入眾來犯重誣他者治罰如前第十依經立方見病處藥非於方吐於藥有何益乎若上來九制聽懺者屬懺無慙愧心不能自新此是吐藥之人宜令出眾若能改革後亦聽还若犯諸制捍不肯懺此是非方之人不從眾網則不同止大隋開皇十七年四月十五日寺僧灌頂受旨書制文知堂上座慧陳秉制奉行授菩薩戒儀教行錄金園集原夫大乘菩薩戒者菩薩道之根本正覺果之因基故梵網經云戒如明日月亦如瓔珞珠微塵眾菩薩由是成正覺其求受之法如前略明若欲委知儀式當依法智慈雲二尊者所製具如教行錄金園集文廣不錄須者往撿但立科有多少之異其意大同別立眾制天竺別集解行二科學者所志豈在他制然後乃勤後生無知於己德學事同公役既不獲已須行嚴治略示條件後旋增損凡一十九條其要者略示於安居眾法中餘如彼文須當一一遵行茲不重列訓知事人國清百錄吾少嬰勤苦備歷艱關遊學荊揚雍豫唯著一納三十餘年冬夏不釋體上至天子下至士民雖有所施受而不私一果一縷入眾已後尚無希念況故侵之所以然者眾寶尊重若能增益名甘露苑若有滅損即蒺䔧園自飽自傷因倒因起可以意得何俟多言夫人發心隨有所作為讀誦聽學講說經行懺悔供養捨力未有首尾慎莫中止中止者違本心若再有所作至前止處留難即起修業不成今生現障後彌障道此行人大忌應須竭力善始令終業既坦然報亦圓滿此亦可意得昔有一寺師徒數百晝夜禪講時不虗弃有淨人竊聽說法聞已用心每揚簸洮汰繫念存習謂以淨心揚簸不善以禪淨水洮汰不淨隨有所作念念用心一時執爨觀火燒薪念念就盡無常遷逝復速於是蹲踞竇前寂然入定火滅湯冷維那懼廢眾粥以白上座上座云此是勝事眾宜忍之慎勿驚觸聽其自起數日方覺往上座所具陳所證敘法轉深上座止曰爾向所言皆我境界而今所說非我所知勿復言也因而顧問頗知宿命不答云薄知又問何罪為賤何福易悟答云此賤身者前世之時乃是今日徒眾老者之師亦是少者之祖師徒眾所學皆昔所訓爾時多有私客恒制約不敢侵眾忽有急客輙取少菜忘不倍備由此譴責今為眾奴前習未久薄修易悟宿命罪福其事如是一眾聞此悲不能勝鑑鏡若斯豈可不慎同學照禪師於南岳眾中苦行禪定最為第一輒用眾一撮鹽作齋飲所侵無幾不以為事後行方等忽見相起計三年長至數十斛急令陪備仍賣衣資買鹽償眾此事非久亦非傳聞宜以為規莫令後悔吾雖寡德行遠近頗相追尋而隔剡嶺難為徒步老病出入多以眾驢迎送此是吾客私計功醻直令彼此無咎吾是眾主驢亦我得既捨入眾非復我有我不合用非我何言舉此一條餘事皆爾警誡將來出家之士當須守分為先持戒為本若行乖理之行作不善道非但自己之無置抑亦有玷於叢林佛戒精嚴各當持守且如來立乎禁戒不得殺盜淫妄言綺語惡口兩舌貪嗔癡等惡如有犯者獲罪不輕欽惟國朝誡賴僧徒奉遵佛制除刑名重罪例屬有司外若僧人自相干犯當以清規律之若非法妄為若污行縱逸若侵漁常住若私竊錢物若闘諍犯分搖唇鼓舌惱亂眾者輕則罰拜罰錢罰香罰油以榜示之如關係錢物則責狀追陪重則杖捶集眾燒衣鉢遣逐偏門而出示以耻辱令改過自新也詳此一條制有四益一不污清眾生恭敬故二不毀僧形循佛制故三不擾公門省獄訟故四不揚外醜護宗綱故六和同處慎之慎之日月軌則大率新入叢林先須洞明規矩禮度合轍恭敬繫心如阿含經云不恭敬不繫心而欲令威儀足者無有是處不備威儀欲令學法滿者無有是處學法不滿乃至欲得無餘涅槃者無有是處是故當勤學恭敬繫心畏慎也日用常行無非是道四威儀中毋請自忽早起入眾學道當勤精進睡不在人前起不落人後五更鐘聲未鳴輕身先起莫驚同齋抖擻精神攝心端坐繹思日所誦文或製作未完或難疑未解祖師有云靜處思微道之正軌次第轉身下牀想念偈云從朝寅旦直至暮一切眾生自回護若於足下悞傷形願汝即時生淨土唵逸帝律儀娑婆訶取手巾塔左手輕開門戶年放簾箔出後架不得拖鞋咳嗽作聲轉手取桶洗面不宜多湯嗽口須低頭吐水以手引下直腰吐水恐濺隣桶不得洗頭有四種自他不利污桶膩巾枯髮眼不得鼻內作聲不得噴水撲面不得高聲嘔吐不得涕唾污桶禮誦若禮誦時先念淨口業真言次披袈裟則合掌頂戴念云善哉解脫服無相福田衣我今頂戴受世世常得披唵悉陀耶娑呵摺袈裟須齊整置架上問訊而去坐具不得同掛架上若登殿堂燒香不得居中當於下手邊約三步半問訊炷香左轉身三步半問訊如遇長上燒香必須小立相讓若禮拜不得占中央尊住持也不得出聲課誦不得行禮拜人頭邊過五更鐘鳴想念偈云願此鐘聲超法界鐵囲幽暗悉皆聞三途離苦罷刀輪一切眾生成正覺至長板鳴眾俱詣殿俟諷誦或禮懺須各至誠禮佛時深知佛體不離我心同一覺源妙應斯感一身徧至諸佛之前一拜普消無邊之罪互跪右膝著地以三處翹聳故名互跪天竺之儀也合掌兩手當心此方拱手為恭西土合掌為敬手本兩邊今合為一表不散誕專至一心法苑云有指合而掌不合或掌合而指開良由心慢而惰散也拜則正身威儀五體投地輔行云双膝前詣双手續施後方額扣肝膽委地想佛足下施手承足如對目前若以中拇指相柱或以掌承面或捺地並非儀也默想云能禮所禮性空寂咸應道交難思議我此道場如帝珠釋迦牟尼影現中我身影現釋迦前頭面接足歸命禮禮餘佛菩薩但改釋迦佛為異若拜不運心徒勞苦行法苑云雖有設拜心馳外如碓上下空無所獲赴堂諷誦畢歸鉢位入堂時須去帽從南頰入對聖僧問訊不得中央及北頰入蓋尊住持也若修懺畢起堂小者先行分上下堂入在上堂右足先入在下堂左足先入合掌歸位先朝鉢位問訊隣位即左轉身問訊對牀坐者其左右及對面坐者但合掌答問訊若已先坐上中下座後來亦須合掌古云不敬上中下座婆羅門聚會無殊裏帽上床以右手歛左邊衣袖腋下厭定復以左手歛右邊衣袖然後兩手按牀兩足撥鞋入牀下先縮左足次收右足竦身上近𮪸趺坐敷袈裟蓋膝上不得露內衣不得埀衣床緣念登床偈云登此無礙解脫床平等智慧清淨光若齋時候巡火板鳴入堂木魚響不得入堂則令行者取鉢外堂坐木魚鳴後聞長板鳴下鉢擡身正起立定然後左轉身合掌念偈云執持應器當願眾生成就法器受人天供以左手拓鉢右手解釣復以左手提鉢轉身以鉢加額正蹲身放鉢免將腰背撞人安鉢左邊淨板上不得頓身坐候轉鼓僧堂應鐘鳴大眾望塵合掌表迎聖僧入堂古法則下床迎聖僧或者謂迎住持也聖僧即賓頭盧受佛付囑住世應供故伽藍中立廟法苑云堂中聖僧多云是陳如非也緣經律不令為立廟故不起供故合掌畢移鉢安面前合掌默想云佛生迦毗羅成道摩竭陀說法波羅奈入滅俱絺羅聞椎聲頭首舉展鉢偈若展鉢時當願眾生身心寂靜離諸麤暴眾和畢或想偈云如來應量器我今得敷展願共諸眾生等三輪空寂然後解袱展淨巾覆膝上摺轉袱三角莫令埀下次展鉢單仰左手取鉢安單上以兩手大拇指迸取鍵𨩲從小次第展開不得敲磕作聲護第四第五指為觸指不得用仍摺鉢拭令小近身橫安匙筯袋放鉢拭下出則先匙入則先筯把處為淨頭向上肩鉢刷安第三鉢縫中出半寸許盛生飯展鉢竟直日鳴椎一下云今白月幾日晨朝各記六念眾默想云云六念有二其一式見後其二云念佛念法念僧寶念戒念施念諸天三業所修諸善根迴向眾生及佛道畢又鳴椎一下迴向云云頭首舉佛號眾和合掌不得手指參差須當胸高低得所不得以手枕膝上不得以手托口邊古云參差合掌不當𦚾兩手交加插鼻中拖履揭簾無欵細嘔聲泄氣逞英雄十念畢行粥時頭首自唱施粥偈云粥有十利饒益行人果報無邊究竟常樂又偈云持戒清淨人所奉恭敬隨時以粥施十利饒益於行者色力壽樂辭清辯宿食風除飢渴消是名為藥佛所說欲得人天長受樂應當以粥施眾僧此偈眾和二偈如用其一齋時唱食亦有二偈偈云三德六昧施佛及僧法界有情普同供養此偈頭首自唱又偈云此食色香味上供十方佛中奉諸賢聖下及六道品等施無差別隨感皆飽滿令今施者得無量波羅蜜此偈眾同誦二偈亦如用其一受食以兩手捧鉢或多或少則以右手起止之受食默想偈云若受食時當願眾生具足戒滿一切菩提受一切味云若受味時當願眾生得佛上味甘露滿足若見鉢滿想偈云若見鉢滿當願眾生具足飽滿一切善根行粥將徧鳴椎一下眾作五觀想云一計工多少量彼來處二㤔己德行全缺應供三防心離過貪等為宗四正事良藥為療形苦五為成道業故應受此食想畢鳴椎一下頭首舉食偈云若食時當願眾生禪悅為食法喜充滿眾和畢上下肩當以面相朝揖食不得正面以手搖曳兩邊齋時出生想念偈云汝等鬼神眾我今施汝供此食徧十方一切鬼神共出生之法不過七粒太少為慳食匙筯頭不可出生以右手取飯於左手掌心按之置鉢刷上凡受食則用出生或不受食却不可桶杓內攝飯出生蓋出生之設謂分已所食與諸鬼神夫出生有三緣一施曠野鬼及施鬼子母等此曹本食肉啖人佛化之受戒不殺乃囑弟子隨處施食不能施者非佛弟子今齋堂各各出生是也二施餓鬼今齋堂別具小斛於食畢眾作法施之或各具小生斛夜間呪施是也大凡食法不得將口就食不得將食就口取鉢放鉢并匙筯不得有聲不得咳嗽不得觸鼻噴嚏若自噴嚏當以衣袖掩鼻不得搔頭恐風屑落隣單鉢中不得挑牙不得嚼飯啜羮作聲四分戒本云正意受食平鉢受飯平鉢受羮羮飯俱食以次食不得挑鉢中央食不得以飯覆羮更望得不得視比座鉢中起嫌心不得大摶飯食不得張口待飯食不得含食語不得摶飯擲口中不得遺落飯食不得頰飯食不噏飯食不得舌䑛食不得振手食不得手把散飯食當隨量受食不得請折律云量腹而食增一云多食致苦患少食氣力衰處中而食者如秤無高下不得將頭鉢盛溼食不得將羨汁於頭鉢內淘飯食不得桃菜於頭鉢內和飯食如有菜滓安鉢後屏處食時須看上下肩不得太緩未再請不得刷鉢不得吮鉢刷作聲食未至不得生嗔動念古云獃獃四顧起悲嗔念食吞津咳𠻳頻粥啜羮包滿口開單展鉢響諸隣若用扇不得扇隣位如己怕風白維那於外堂坐若行者撥扇時自不得用扇洗鉢以頭鉢盛水次第洗次鉢小鉢不得頭鉢內洗餘鉢并匙筯仍屈觸指不得漱水作聲不得吐水鉢中不得先以熟水洗鉢未折鉢水不得先收蓋膝巾不得以膝巾拭汗不得以餘水瀝地上折水想念偈云我此洗鉢水如天甘露味施與鬼神眾悉令得飽滿唵摩休羅細娑婆訶收鉢以兩手大指迸定次第而入裏畢鳴椎頭首舉食訖偈小食已訖當願眾生所作皆辦具諸佛法飯食訖已色力充依止十方三世雄回因轉果不待念一切眾生獲神通二偈如誦其一眾和食畢不許先起鳴椎之後住持下地大眾掛鉢不得脚踏床緣下地莫令袈裟塔床緣須近前立問訊出堂我比丘某今朝白月一日乃至十五日隨改黑月大小一日乃至十五日十四日隨改我無有請處僧常食念自赴我今乞食我於某年某月某日某時受具今若干夏我今三衣鉢具缺並受持長衣已未說淨我今依眾食我有某緣得別眾食我今無有病堪可行道念須療治出僧祇律不念結犯大師云夫食者眾生之外命若不入觀即潤生死須作觀觀之者自恐此身內舊食皆是無明煩惱潤益生死今之所食皆是般若想於舊食從毛孔次第而出食既出已心路即開食今新食照諸暗滅成於般若淨名云於食等者於法亦等以此食故成般若食能養法身法身得立即得解脫是為三德照此食者非新非故而有舊食之故而有新食之新是名為假求故不得求新不得畢竟空寂名之為空觀食者自那可食為新既無新食那可得食者而不離舊食養身而新食重益因緣和合不可前後分別名之為中只中即假空只空即中假只假即空中不可思議名為中道淨名云非有煩惱非離煩惱非入定意非起定意是名食法也讀誦殿堂諷誦畢或歸齋中看讀或詣法堂誦文不得埀衣坐不得曲肱枕頭不得聚頭語笑不得隻手揖人其新學讀文於四書之中當自四教儀而始蓋此一書乃如來出世五時施化大小乘法咸攝其中先習此者可知梗槩漸入佛道故也若看經不得高聲不得長展經不得埀下經帶不得拓經行誦慈雲云念佛誦經攝心要門正心正意如對尊容云云具如天竺續集大師云夫欲誦經別座趺坐觀所坐之座高廣嚴好次觀八部四眾圍繞聽法次須運心觀我能為法師傳佛正教為四眾說想所出聲非但此一席眾乃至十方皆得聽受名為假觀次觀能說之人所誦之經何者是經為經卷是為紙墨是誦者為心是誦為口是誦為齦齶和合而出為有我身為無我身誰是誦者觀此四眾為是實有為從想生四眾非有無我能誦是名空觀雖無所誦之經而有經卷紙墨文字雖無能誦之人而有我身為眾宣說雖非內外不離內外雖非經卷不離經卷雖非身口不離身口從始至終必無差謬名不可思議能作此解能作此觀名為三觀於一心中得不前不後三觀宛然云云具如觀心誦經法略錄三觀餘須往撿遊行若遊山時草屨不得經行殿堂古云衩袒不許登殿草履莫踐法堂不得殿前倚靠欄干不得狷狂急走古云行須縘步習馬勝之威儀語要低聲學波離之軌範殿塔內不許閑行古云無事不須登佛殿等閑休向塔中行不因換水添香火縱有河沙福也傾廊下行須讓耆宿不得赤脚著僧鞋不得把手共行不得搖身掉臂不得叉腰不得蹲坐不得戲笑不得談世諦是非古德云別了雙親弃本師訪尋知識擬何為不曾說著宗門事白首無成過在誰如廁欲登廁當行須早作意不得臨時失儀以淨巾塔左手不得道上為人作禮亦莫受人禮當叉手視地而行脫直裰於笎上以手巾繫定作記認右手提水至廁邊先須彈門三下無人方入已有人不得相逼若多人住處廁外有人待急縱未了且須出廁若入廁換鞋不得參差安淨桶在前彈指三下警噉糞鬼免灒汙之踞身令正不得偏倚或夜闇用廁篦於孔中向前後劃令知長短闊狹正不正等不得努氣作聲不得涕唾不得隔壁共人語當直視前不得低頭下視不得持籌劃壁作字不得多用籌用籌了當安籌盝中不得餘處左手洗淨護大指二指中指當六七度用水洗若比丘不洗淨得突吉羅罪不得坐僧床座及禮三寶設禮無福用水不得灒濕不得大費用水淨桶安舊處以乾手安內衣入袴以乾手開門左手提桶出不得濕手拏門扇門頰右手挑灰後挑土不得以濕手取灰土後用皂角洗至肘前入廁出廁逐一念呪入廁大小便利當願眾生貪嗔癡蠲罪垢唵恨魯陀耶娑呵洗淨唵賀曩蜜栗底婆呵淨手唵主加囉耶娑婆呵淨身唵室利曳婆薩娑呵去穢唵拔枳羅腦迦吒婆呵按律小遺亦洗淨按纓絡經云夫登溷者不念此呪假使以十恒河水洗金剛際亦不能淨凡登殿堂瞻禮並無利益奉勸受持每呪誦七遍是故鬼神常相拱諸詳如天竺別集引三千威儀經纂示方法浴凡開浴以右手携浴具律制須持五條至門外輕手揭簾勿使有風入下間門內問訊歸空處揖左右人畢先以五條手巾掛筦上次小坐脫襪起立轉身展袱取浴具放一邊解上衣未卸直裰先脚下裳以脚布囲身次繫浴裙將袴袴摺安袱內將浴衫換身掛直裰與五條作一處將手巾繫定內衣作一袱覆轉古云三通鼓響入堂時觸淨須分上下衣語笑高聲皆不可莫將麤行破威儀拖鞋入浴不得赤脚入室須在下間空處待次而浴不得占上間讓頭首耆宿故勿令湯水濺人及已拭浴者身不得桶內泡脚不得室內小遺洗僻處不得將脚閣桶上不得槽上揩脚不得互相揩洗當用巾布把兩頭磨背勿搪二邊鄰坐不得堂中洗衣不得淋洗巾等滴槽中不得安巾布槽上古云入浴披衫貴靖恭需湯擊板合送客不應脚布安槽上双足如何著桶中不得笑語不得戽水不得掇桶澆身須當遮護渾身勿令躶露脚布不可離身湯水不可多用或有瘡或洗灸瘡或用疥藥宜後入浴不得攙先不得將公界手中拭面出浴須揖上下肩而坐次第著上衣先披直裰即著下裳解浴裙摺脚布安浴裙免濕浴袱揖左右出堂若有設浴施主隨意課經迴向慈雲製入浴室略知十事如天竺別集云云坐禪凡學道者覧教照心研心作觀故諸祖畫講夜禪歲無虗日夫坐禪之相者若半加以左脚置右䏶上若全加更上下右脚置左䏶以左掌置右掌上頓置左䏶正身端直鼻與臍對平面正住閉口令斷外風齒纔相拄著舉舌向齶閉眼纔令斷外光而已次令氣息調勻心離昏散即觀現前剎那一念妄心四明尊者云觀一念識心德量無邊體性常住十方諸佛一切眾生過現未來虗空剎土徧攝無外咸趣其中如帝網之一珠似大海之一浪浪無別體全水所成水既無邊浪亦無際一珠雖小影徧眾珠眾珠之影皆入一珠眾珠非多一珠非少現前一念亦復如是今觀諸法即一心一心即諸法非一心生諸法非一心含諸法非前非後無所無能雖論諸法性相本空雖即一心聖凡宛爾即立即破不有不無境觀雙忘待對斯絕非言能議非心可思故強示云不可思議微妙觀也夜分初夜之時施食禮佛竟或禪或誦自在行之當勤精進慎莫放逸古云頻警光景坐勿消時俾夜作晝勤而行之聞定鐘合掌念偈云聞鐘聲罪業輕智慧長菩提生離地獄出火坑願成佛度眾生若貪睡者眠轉滋多經云勿以睡眠因緣令一生空過若睡重者須少息解睡律制須披五條右脇而臥為尊左肩衣也不得仰臥仰為屍睡覆為淫睡故多惡夢四儀入叢林者行住坐臥莫越軌範新學生疎當以善言誘喻勿起嫌心不得衩袒廊下行齋中不可露白齋前塔衣齋罷持衣不得弄數珠作聲而同戲物放參後不得出三門不得無故入諸寮齋舍晝三夜三幸宜勤䇿十二時中所為之事佛經俱有遺誡可不遵從日用偈語如前已明有未列者故茲重錄睡時若就睡時當願眾生一切安穩得大自在起時睡眠始窹當願眾生一切智覺周願十方洗手事訖就水當願眾生出世法中疾速而往洗面以水洗面當願眾生得淨法門永無垢染登殿若見佛時當願眾生得無礙眼見十方佛登閣上昇樓閣當願眾生昇正法樓徹見一切瞻塔見佛塔時當願眾生尊重如塔受人天供禮塔頂禮於塔當願眾生一切人天無能見頂洗浴洗浴身體當願眾生身心無垢內外光潔濯足若濯足時當願眾生具足神力所行無礙摘草淨手摘草手中挪還向水上波此處無淨水淨處薩婆訶坐堂凡僧堂茶湯及朔望坐堂之法並須著床裏蒲團坐蓋床外三寸裏七寸名淨牀食時安鉢非坐處也近人往往就外從便而坐甚失法制切須戒之普請凡安眾處有必合資眾力而辦者庫司先稟住持次令行者傳語首座維那分付堂司行者報眾掛普請牌牌上貼云某時某處或聞木魚或聞鼓聲各持絆膊塔左臂上至普請處宣力除老病外並宜齊赴普請之法一為福田中植淨業故二為上下均力故律云因佛說掃地勝利時諸老宿比丘皆弃禪誦掃地佛止曰我為知事人說某知事人又不徧掃佛令鳴犍椎總集共為之此普請之始也訓童行凡朔望上堂罷參頭行者令喝食行者報各局務行堂前掛牌報眾昏鐘鳴行堂前鳴板三下集眾行者至佛殿祝讚後詣方丈排立參頭入請住持出趺座參頭緩聲舉云參眾低聲同云不審問訊拱聽法誨畢參頭舉云珍重眾低聲同和問訊而退如住持他緣則喝食行者喝云奉方丈慈旨參眾云不審次喝云放參眾云珍重同問訊而退次詣都講寮首座寮庫司參參與免參並同前禮訓童行之法當說出家因緣或說規矩禮度或說經中大意月分須知正月歲朝各寺祈禱或修光明懺七晝夜或三晝夜或但供天三日各隨寺規又行堂寮前新歲元宵諷經行堂維那白燈回向寮前知客白燈回向初五日法智尊者忌辰但四明延慶依子皐昇法師禮文如天台祖忌修設今諸方當念中興教觀之功亦宜修敬若欲從簡亦須依山門歷代住持忌同二月住持都講首座當此之時開春講訓眾初五日荊溪尊者忌十五日佛涅槃三月清明節掃洒祖塔上食設禮諷經禁採茶笋蔭𣝡山林四月初一日堂司出草單初八日佛降生庫司嚴設毗藍園浴佛營備供養諷經十四日起呪呪沙水二日擬安居散洒制後三日行茶湯禮二十日啟講懺住持開講晦日說戒五月建青苗會三日預出誦經單日住持開講請頭首開講庫司檢點諸處整漏疏浚溝渠十五日說戒六月隆暑罷講或不罷在住持行之古人行道不憚寒暑坐夏九旬必期取證住持首座鞭䇿晚生毋使怠惰當效古人行習讀鎻試之法十四日說戒七月初一日啟蘭盆會要期半月晨朝修小彌陀懺粥罷修大彌陀懺齋罷誦蘭盆經至晚誦彌陀經繫念預率眾財修設斛食至望日滿散十六日解制八月初七日章安尊者忌此月兄弟出入參訪裝寒覲省故不可廢卷然燈火可親又當勉之九月啟秋講或說文字十月初一日開爐十一月冬至或修光明懺或供天冬齋隨寺規辦方丈請大眾冬前點心二十四日天台大師忌十二月初一日啟臘佛會要期一月初八日佛成道營辦供養庫司預備紅糟歲終結呈諸色簿書計筭錢穀掃洒殿宇習新歲修懺儀式預備賀年物儀分歲請大眾湯果誡勸門第八真歸門第九吾佛滅度諸弟子皆奔雙林之喪至於闍維八分舍利建塔以藏虔奉之禮靡不致謹今僧之示寂雖不及吾佛聲光之盛然於送死事亡之禮詎可廢歟夫釋氏居喪之禮不必如世俗之制請遵天台大師之誡東林遠公之儀凡弟子不服不哭苟移哀於道必至矣准梵網明誨若和尚闍梨亡滅之日及三七日至七七日皆應講說大乘經律斯佛語也但能退居勵行修香火齋戒之福幽顯兼益奚則乖於孝哉或有不知爾者但窺衣盂之蓄謀為己利至於忿諍很闘爪扶力攘此且異類之所不為而其人自視以為得計吁醜吾教者匪斯徒其誰歟住持示寂方丈示疾覺知時至當請兩序勤舊點對封記衣鉢行李準留浴殮衣服亦行封記併留方丈差公謹行僕看守以俟估唱或有標撥俵散須要公平毋令恩怨不均致後爭競遺戒小師不得披麻慟哭釋子師親或喪痛自心起何有不哭但不得縱聲稱蒼天罪逆之語如佛滅度弟子皆哭未離欲者宛轉于地五百問云師亡不得舉聲大哭應小小泣淚微薄祇可從儉請首座主喪一切佛事並免但舉無常偈同亡僧津送勿費常住若住持有功於山門寺眾念其遺愛或衣鉢稍豐當如儀講行喪禮如有遺書即當遣送遺囑式遺書之式入龕初示寂侍者即令客頭行者報兩序諸寮兩序耆舊繼時詣方丈吊慰畢首座同兩序耆舊商議發計狀式見後報諸山及發書請人主喪須諸山名德隣封老成或法眷尊長或只本寺首座如有遺命遵行舉請小師侍者親隨人當躬自洗浴著衣淨髮入龕安排寢堂置龕遺偈貼於龕左設几筵供養鳴僧堂前鐘首座大眾至寢堂吊慰小師諷經維那述偈回向云因緣所生法我說即是空亦名為假名亦名中道義仰冀真慈俯垂昭鑒茲為堂頭和尚示寂入龕之次諷誦真乘稱場聖號所集功德奉為覺曇增崇品位十方云云當夜諷誦回向同前但改入龕二字為停龕龕惟二時上粥飯三時上茶湯大眾諷誦維那回向並同訃狀式請主喪凡主喪者須老成名德理合首座恭請近乃見職知客請主喪人至鳴大鐘集眾門迎至龕前炷香畢入幕吊慰小師云法門不幸和尚歸真且望節哀以終大事小師觸禮一拜主喪仍慰兩序大眾云法門不幸堂頭和尚遽戢化權敢冀大眾力為住持後事首座答云尚賴和尚力賜主張大眾問訊散兩序耆舊送主喪人歸客位插香展禮主喪人居主位首座分手坐定首座起燒香復位獻茶畢小師列前插香大展三拜方丈執局及參頭領眾行者相次插香禮拜後方丈僕從參拜罷獻湯送兩序出庫司備點心兩序光伴次第巡寮請喪司職事主喪人巡寮回兩序耆舊小師隨到客位呈衣鉢簿遺墨等物會茶議請喪司職事兩序耆舊各請一人掌財庶絕浮議仍請書記作祭文回發書簡見職知客接外客喪司公差庫子客頭茶頭一行人管辦事仍具喪司合干人僕排單揭示主喪人須與首座計會所遺衣鉢多少約作三分一分准孝服并諸山諷經䞋錢等用一分准做齋等用一分俵大眾看經并佛事板帳等用請見職維那同議主喪人須存公正不可徇私帶行僧行不得干預執役仍議請一切佛事資次見後并分孝服如無布絹折錢俵之孝服釋氏喪服涅槃諸律並無其制近有戴白披麻深非所宜若順世儀服從恩制著生侍者小師麻布裰兩序苧布裰主喪及法眷尊長生絹裰耆舊辦事鄉人法眷諸山生絹腰帛檀越生絹巾腰帛方丈行者麻布裰方丈人僕作頭麻布巾衫諸僕甲佃麻布巾佛事鎻龕法堂掛真對靈繫念起龕山門首真亭掛真奠茶湯秉炬起骨入塔入祖堂全身入塔撒土移龕掛真讀遺偈入龕畢或三日或一日或繼時移龕置于法堂入龕三日閉龕鋪設法堂置龕西間用麻布幃幕前設香燭素華中間生絹幙法座上掛真牌位列祭筵用白紙作娑羅華八以簇座上表雙林之相東間掛帳幙設牀座椸架置平生道具之屬如事生之禮靈前二時上茶湯粥飯諷經詳見應師五衫集仍備挑燈鐃鈸華旛鳴僧堂前鍾集眾龕前諷經回向同前但云移龕之次移龕下法堂請鎻龕佛事并掛真佛事畢如有親書遺偈侍者捧呈主喪人及首座大眾則主喪躬接遞與首座以所書香爐上熏授維那讀過喪司行者貼法堂中間上手幙上小師列真前禮拜歸幙下主喪炷香上茶湯禮真兩序耆舊大眾以次炷香禮真小師真左答拜畢諷經回向云云小師夜守龕帷喪司列排祭次見後貼法堂下間幙上凡祭文皆喪司書記為之若檀越諸山來有前後隨時上祭不拘若法眷門人上祭到門知客接已即報喪司隨送孝服然後上祭所有賻儀喪司置簿攸受大夜上祭喪司預多辦祭食准上祭人送錢回祭先兩班上祭燒香設三拜維那讀祭文畢舉大悲呪一遍回向云上來諷誦功德奉為新示寂堂顯和尚增崇品位十方云云次第一一上祭畢舉大悲呪迴向同前若小師等上祭禮九拜後行者禮拜諷經人僕參拜祭次知事頭首主喪西堂耆舊江湖大眾辦事舊侍者鄉人法眷諸菴塔院嗣法門人小師師孫方丈行者六局行者行堂方丈人僕轎番老郎莊甲火客諸色作頭繫念維那同小師前一日懷香詣客位拜請主喪人或請大諸山大夜繫念預令對靈設座至晚上祭畢誦大悲呪三遍洒淨開啟白佛云云畢鳴鼓昇座祝香云云趺座兩序座下問訊如常式小師等插香設三拜第一時提綱敘謝結座坐誦彌陀經或一卷或二卷舉阿彌陀佛真金色云云稱佛號一千聲至百聲下座領眾行道菩薩各十聲主法人歸座回向伏願云云仰憑大眾懺悔發願云云第二時第三時說示淨土觀門各誦經念佛回向並與前同第三時畢具疏詣龕前躬自回向法師用帶行侍者燒香或令其啟白并迴向等施食畢小師拜謝或三時各請諸山或只舉行一時隨衣鉢豐約行之三時中各行茶湯點心出喪掛真奠茶湯庫司喪司相關提調喪儀香亭真亭幢幡唄樂龕前傘椅湯爐挑燈如意拂子香合法衣等物小師隨龕後鳴大鐘諸法器送喪首座大眾至龕前舉心經維那燒香引小師拜請起龕佛事龕至山門首請真亭掛真奠茶湯俱有佛事兩序大眾門列俟龕出已維那朝內問訊舉彌陀佛號大眾齊念主喪領眾兩兩對出左右行者俵雪柳齊步並行不得挨肩交語都寺押喪維那知客依行喪䞋為首小師提爐引龕茶毗龕至涅槃臺都寺上香茶了維那進前燒香引小師拜請秉矩佛事維那念誦是日則有新示寂堂頭和尚既機薪而已盡乃應火以云亡真身常寂而無去無來性火闍維則示生示滅仰憑大眾資助覺靈南無西方極樂世界大慈大悲阿彌陀佛聲上來稱揚聖號恭贊化儀出現世間為作人天之眼目率籠教綱恢揚佛祖之關處息化以歸真冀回光而返照茶傾三奠香爇一爐奉送雲程和南聖眾首座舉楞嚴維那回向如前但改茶毗之次次鄉人舉經大眾須同諷念畢首座領眾歸寺齋小師鄉人法眷守化收骨齋罷鳴僧堂鐘集眾仍備儀從迎骨回寢堂安奉掛真供養諷經二時上粥飯三時上茶湯每日大眾諷經靈骨入塔則止如入塔日遵大眾諷經或三日五日外餘日則小師法眷諷經全身入塔龕至塔所都寺上香茶畢維那燒香引小師拜請入塔佛事舉經諷誦次第並與涅槃臺同但回向則云入昏之次侯掩擴畢然後請撒土佛事迎真回寢堂供養主喪炷香禮真次諸山兩序大眾小師禮真畢小師插香大展三拜謝主喪次兩序大眾謝主喪詞云山門不辛先堂頭和尚示寂極荷主盟後事主喪答云仰荷扶得無矌敗主喪同喪司一行人巡寮致謝次小師巡寮拜謝每日真前三範上茶湯集眾諷經俟迎牌位入祖堂則止或待新住持至方入祖堂有佛事靈骨入塔至期隔宿准備儀從正日鳴鐘集眾都寺上香畢請起骨佛事送至塔所請入塔佛事諷經回向並與全身入塔語同迎真歸𮄎堂供養及謝主喪人等禮並同唱衣至期僧堂前或法堂上下間設眾坐位中間向裏橫安長卓置筆硯大磬於上鳴僧堂鐘集眾首座與主喪分手兩序大眾次第而坐維那知客侍者面內朝主喪位坐維那念云留衣表信乃列祖之埀規以法破慳稟先達之遺範今茲估唱用表無常為是緣念清淨法身毗盧遮那佛云云眾念畢開籠出衣鉢依號排席上維那鳴磬一下白云夫唱衣之法蓋稟常規新舊短長自宜照顧磬聲絕後不得翻悔謹白若法衣多或結緣鬮拈或添留囑次第呈衣維那拈唱喪司合千人貴在公心主行維那定價打磬行者瞻𮨇前後喝定名字知客寫名上單侍者依名發標唱衣畢結定鈔數主喪僉單交鈔取衣不得徇私減價主喪力主其事今多作鬮拈甚息喧爭喪司當預前集兩序耆舊將抄劄衣鉢除留遺囑送外估定新舊短長價直高下庶免唱衣臨時紛紜其法用小片紙以千字文次第書字號每一號兩頭書字中用印記關防量眾多少與喪司合千人封定至期呈過主喪兩序首座開封知客分俵侍者剪取其半堂司行者捧盤盛之畢以盤置首座側安水盆於下維那拈衣唱價訖首座臨時呼一童行盤中抖勻信手拈半鬮遞與首座開看字號分曉說與堂司行者唱其字號眾人各開所執半鬮字號同者即應如不願唱此號衣物則不應三唱不應首座以半鬮投水盆中再令撮起半鬮復唱起應者堂司行者往收半號到首座處對同報與維那稱云某物唱與某人鳴磬一下知客上單侍者發標堂司行者遞與唱得人衣物仍舊入龕次第唱畢維那鳴磬一下回向云上來唱衣念誦功德奉為示寂堂頭和尚增崇品位十方云云眾散各自照價持標取衣三日後不取者依價出賣其唱衣古法收支單帳見後亡僧總列下遺書喪事畢主喪請侍者辦事人充專使分路馳送諸山法眷檀越官員遺書唯尊宿相見對語須擇能事人充專使至彼寺首到客司相見知客引見侍司預備柈袱盛書物侍者詣方丈通覆住持當即相接令請兩班接遺書專使進前問訊云請和尚趺坐若住持垂語須下語插香展禮住持免則觸禮如常相看入座燒香献茶畢起爐前謝茶再插大香一片展禮稟云某處和尚某月某日歸寂遺書遺物令某馳送即呈書物住持云法門衰落不勝哀威兩班候講禮畢進問訊首座分手就坐專使面住持退一位坐茶罷起身住持白云法門不幸某處和尚歸寂不勝哀感行者備剪刀拓書物侍者度書與住持接就爐上熏付侍者送與維那行者度剪開緘讀畢侍者揖專使上住持對面位坐侍者燒香献湯送專使歸安下處先住持問訊次兩序侍者問訊知客引巡寮先庫司次頭首寮及耆舊諸寮侍者稟請特為湯湯罷藥石至晚湯果大方遺書至兩班光伴以次者兩班上首維那光伴請書記作祭文方丈祭文或住持自作江湖法眷辦事皆當致祭侍者一一提調次早方丈請湯喚粥罷請茶法堂下間設靈几排祭侍者覆上堂行者報寮掛上堂牌座下備卓袱盛書物座前左排住持位鳴鼓集眾住持出法座下位前立鼓絕進香卓知客引專使住持前行禮插香初展云輙持遺墨仰讀尊慈下情不勝惶恐之至再展云即日時令謹時共惟堂頭和尚尊候起居多福三觸禮拜呈遺書住持接書爐上熏付使者遞維那宣讀專使問訊歸知客班後立住持陞座云云下座詣靈几前炷香點湯上祭點茶展拜專使座右還拜維那出班揖住持燒香侍者捧香合兩序出班燒香畢住持兩序展拜維那宣祭文住持復展拜專使答拜舉大悲呪回向上來諷經功悳奉為某處和尚增崇品位十方云云兩班耆舊江湖辦事鄉人皆致祭專使答拜以下法眷小師辦事則不答拜舉呪回向如前祭舉諷彌陀經稱聖號回向因緣所生法云云仰冀真慈俯回昭鑒上來諷演真乘稱揚聖號功德奉為某處和尚增崇品位云云畢專使出靈前兩展三禮謝住持免則觸禮次巡寮致謝然后山門管待專使請兩序光伴若前住當山一併入祖堂諷經畢就迎牌至祖堂住持拈香安牌有法語安已專使即拜謝住持或無遺書遺物與當代住持其徒自為入祖堂者初至寺見侍者引見住持插香展拜就座燒香喫茶起身稟意畢送安下處次到頭首庫司耆舊諸處相看擬日辦供俵䞋法堂致祭諷經牌入祖堂住持有法語禮與前同若嗣法師遺書至方丈開書兩序先慰住持法堂中間設祭座前拈香有法語不得慟哭應小小泣淚上湯三拜又上食上䞋三拜上茶又三拜讀祭文畢舉大悲呪回向云云兩序并耆舊江湖鄉人法眷小師辦事皆有祭住持居靈几之左如有諸山及座下西堂法眷與師為行輩者上祭則住持同專使答拜以下者則不答拜祭畢諷彌陀經回向同前首座領眾慰住持云法門不幸令師和尚歸寂後學失依不勝悲悼尚冀堪忍力行此道管待主喪及喪司執事人山門當備供䞋高下一一如儀就方丈坐仍請兩班耆舊光伴首座攝居主位都寺行禮與常特為同茶畢鳴鐘集眾送主喪人亡僧抄劄衣鉢凡有僧病革同齋者率鄉人道舊稱念阿彌陀佛號求佛慈光接引使其正念現前預令堂司行者稟請方丈兩序同到病人前抄寫口詞式見後直病人同維那堂司行者收拾衣物行李具單見數一一封鎻外留裝亡衣服直裰內外衣裳香合數珠鞋韈淨𩬊巾收骨綿子等合用之物并所封行李交點同齋人收管若單寮耆舊行李多者庫司差人就房看守其單帳鎖匙封押納首座處或病者不能分付住持首座維那力當主行無行李者亦須盡禮津送若亡僧非生前預聞住持兩序耆舊及無親書不可擅自遺囑衣物口詞抱病僧某右某本貫某州某姓幾歲給到某處度牒為僧某年到某寺挂搭今來抱病恐風火不定所有隨身行李合煩公界抄劄死後望依叢林清規津送年月日抱病僧某甲口詞浴亡入龕諷誦如病僧瞑目同齋即報維那令堂司行者報燒湯覆首座知客侍者即令首座維那知客侍者四寮人僕擡所封亡僧行李歸堂司覆庫司差人擡亡及龕浴舡於涅槃堂安排浴亡浴畢淨髮拭浴衣被酌量分俵浴亡人手巾與淨髮人維那提著衣入龕龕前鋪設椅卓位牌牌上書云新圓寂某人隨聀稱呼書備香燈供養現前僧眾諷空品經稱聖號回向云云但改入龕之次至夜點長明燈堂司行者預造雪柳幡花排設整齊若西堂大耆舊別排祭筵掛真上下間敷設七日諷誦作功果每晚俵經資若次者五日又次者三日每日直靈行者上粥飯知事三時燒香上茶湯堂司行者候齋粥下堂即鳴引首座領眾至龕前住持燒香畢舉空品稱聖號回向同前則云停龕之次至晚鳴僧堂前鐘集眾諷彌陀經稱聖號述偈回向云云每日三時禮同如鄉人法眷俵䞋諷經則鄉長燒香如遇旦望景命日免諷經未可出喪請佛事秉炬必請住持舉佛事其餘鎖龕起龕起骨入塔佛事罷那稟首座商議依資次輪請頭首為之堂司置佛事簿以備稽考輪清若亡者是西堂單寮耆舊衣鉢稍豐則添奠茶湯等佛事輪請單寮西堂首座及本山江湖名勝維那詣方丈插香問訊稟云其人圓寂某日茶毗拜清和尚秉炬問訊而退仍帶侍者賫香請頭首禮同如亡者有義小師詣方丈等處拜請估衣維那分付堂司行者請住持兩序侍者就堂司估衣對眾呈過衣籠開封出衣物排地上席內逐件提起呈過維那估直首座都寺折中知客侍者上單排字號就注價直在下依號寫小標貼衣物上入籠仍隨號依價別寫長標以備唱衣時用方丈兩序諸寮舍並不許以公用為公分去物件或亡者衣鉢稍豐當放低估價利眾以薦冥福伴靈其夜若不修設功果候大眾諷經散後就龕前敷排椅凳令堂司行者請兩班并大耆舊或鄉人法眷或單請兩班或一夜或至三夜隨其豐儉量力舉行待眾集首座舉大悲呪酒淨對靈啟白兩土三寶通疏意畢眾坐定首座舉諸品經至後誦彌陀經繫念佛號千聲菩薩號各十聲再白佛宣蔬懺悔發願云云散湯果䞋多寡不拘大夜上發繫念出喪前一日午後堂司行者覆住持兩序諸寮掛牌報眾預報庫司造祭食至晚鳴僧堂前鐘集眾先住持致祭侍者讀祭文次兩班祭維那讀祭文次耆舊江湖鄉人法眷各致祭或各備祭食或納錢回稟畢舉大悲呪一徧回向上來諷經功悳奉為新圓寂某人莊嚴報地十方云云舉彌陀經繫念佛號千聲菩薩號各十聲回向述偈云云仰冀覺靈俯回昭鑒茲為新圓寂某人停龕之次謹將遺下衣資命現前大眾諷演經文繫念聖號功悳奉為覺靈莊嚴報地再勞大眾代為覺靈懺悔嚴願云云如無衣鉢則除去將遺下衣資但云上來大眾諷演若大方名德西堂單寮耆舊有功山門者如上舉行其次者先住持上食不製祭文或先知事上食住持至燒香而已如有鄉人法眷致祭如前畢誦經繫念回向同前或衣鉢稍豐則請住持對靈說法緊念或清都講首座或三時一時如前示寂住持繫念同送亡凡出喪庫司預令監作辦柴化亡差撥行僕鐃鈸鼓樂旛華香燭擡龕喪儀一切齋備堂司行者隔宿覆住持兩序掛送亡牌粥罷鳴鐘堂鐘集眾至龕前舉心經維那出燒香請起龕佛事受請人出班燒香退身問訊次住持前問訊轉身然後與大眾普同問訊從西序邊至龕右側立彈龕三下云云畢鳴鼓鈸舁龕出山門首或掛真奠茶湯維那仍請佛事首座領眾兩行掛立待龕將行維那面裏對眾當中問訊首座舉佛號大眾同念兩兩次第在龕後行各執雪柳行者排立門外低頭合掌待揖僧眾行盡亦隨後送排對而行維那隨龕都寺押喪茶毗喪至涅槃臺知事燒香上茶次住持上香歸位維那出燒香請住持秉炬佛事住持燒香與眾普同問訊法語畢維那向龕念誦云是日則有新圓寂某人了浮生之幻有參性火之真空捨五眾和合之身歸三惠涅槃之藏仰憑尊眾資助覺靈南無西方極樂世界大慈大悲阿彌陀佛眾和十聲畢上來稱揚十念資助徃生惟願三智圓明真不昧七珍林裏常聞天樂之音入惠池中高踞金蓮之座茶傾三奠香爇一爐奉送西歸和南聖眾首座舉楞嚴呪知客回向云仰冀佛慈俯回昭鑒茲為新圓寂某人茶毗之次諷演秘章稱揚聖號功德奉為覺靈莊嚴報地十方云云鄉人法眷道舊諷經伴化維那往來撿視堂司行者送伴化亡等人飯至齋罷收骨或即日塔或迎回涅盤堂供養諷經三日凡亡僧不可搭袈裟從茶毗事律明三衣唯許傳授若坐逝不壞結塔以葬者猶可以被於真體若從茶毗火化之法則不當披搭自取燒衣違律之過或謂亡僧無衣者則當如冥祥記僧妙施衣之法云南宋江陵龍華寺僧妙既亡之後一夕歸房靈語弟子可宋為無袈裟可急為製請僧設供以衣施之我可得也宋如教飯僧施衣既畢比丘道猛即見妙身披衣入堂依僧次坐聽經至散乃不復見今後可將亡僧袈娑於唱衣時作鬮拈法於僧中施不得披塔而焚化他詳如佛祖統紀第九卷中明唱衣茶毗後堂司行者覆住持兩序侍司齋罷僧堂前唱衣仍掛唱衣牌報眾候齋下堂排辨外僧堂住持首座分手位兩序對坐入門向裏橫安凳卓卓上安筆硯聲合用什物地上鋪席俱畢堂司行者覆住持兩序侍者鳴鐘集眾維那知客侍者同入堂向裏列坐堂司行者供頭喝食一行向住持兩序問訊轉身向維那知客侍者問訊畢扛衣籠住持兩序前巡呈封記於首座處請鎖匙呈過開取衣物照字號次第排席上空籠向內側安維那起立鳴聲一下云浮雲散而景不留殘燭盡光滅今茲估唱用表無常仰憑大眾奉為圓寂某人資助覺靈徃生淨土為是緣念清淨法身毗盧遮那佛云云十號畢鳴磬一下云夫唱衣之法蓋稟常規新舊知長自宜諷順磬聲斷後不許翻悔謹白再鳴磬一下拈度牒於亡僧名字上橫剪破云亡僧本名度牒一道對眾剪破鳴磬一下付與行者捧呈住侍兩序堂司行者依號次第拈衣物呈過遞與維那提起云其號其物估唱若干如估五貫則從五伯唱起堂司行者接聲唱眾中應聲次第增價唱至伍貫維那鳴即鳴磬一下云打與五貫餘號並同或同聲應同價者行云喝住云双破再唱起鳴磬為度堂司行者問定某人名字知客寫名上單侍者照名發標付供頭行者遞與唱得人仍收唱過衣物入籠一一唱畢鳴磬一下回向云上來唱衣念誦功悳奉為圓寂某人莊嚴報地十方云云近來為息喧亂多作鬮拈法如前衣物過三日不取者照價出賣大毗婆沙論問命過比丘衣鉢云何得分答彼昔時亦曾分他財物今時命過他還分之又律云為分不均故佛聽集眾可賣共分增輝記云佛制分衣本意為令在者見其亡物分與眾僧作是思惟彼既知斯我還若此因其對治令息貪求故今不省察飜於唱賣之時爭價上下喧呼取笑以為快樂悞之甚也仁者宜忌之入塔唱衣畢即造板帳至第三日出板帳於僧堂前令眾通知如有不令成式及有侵欺許以禮覆上下覈實改正若無實迹不得紊煩違者合擯罰為住持及執事者