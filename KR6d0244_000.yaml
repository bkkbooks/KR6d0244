front:
  text: 教苑清規序天台教苑清規舊嘗刻置上天竺山之白雲堂後弗存今圓覺雲外法師自慶懼久將廢墜乃取故所藏本重加詮次正其舛誤補其闕軼而參考乎禪律之異同為後學復刻焉昔者竊聞之儒以禮立仁義離禮於仁義不可言儒佛以律持定慧離律於定慧不可言佛故雖佛以一切種智攝三界必先用戒菩薩以六波羅蜜化四生不能捨律蓋自中土有佛法以來僧多居於律寺至百丈始別立禪居此清規之所由作也且古今殊時人情亦異帝王制禮不能無所損益佛氏之為法其何獨不然律儀如聖人之有經禮雖非後世所便習而未嘗不傳於今清規如先儒之有家禮雖皆一時所訂定而未嘗不本於古百丈創為清規以輔律而行天台大師兼善毗尼其後人亦因叢林之日用而折中之以匡持其教今教苑清規是也歷歲滋久諸方所守百丈遺法已互有不同山家宜有不能與之盡合者若夫通其變而以時措之其致一也雲外師方究心路業而能垂意於威儀節文之細如此內外交相養之功可謂兩盡之矣非來者所宜取法歟是用不揆其凡陋承命為序系諸篇首云爾至正七年夏三月甲子金華黃溍序自山家教門所論行事於經則有法華三軌弘經之術四安樂行之戒於傳則有國清百録教行録天竺衆制其書粲然靡不備矣若乃漸漬聖訓講肆積年三業四儀自然合道上下浹洽衆用和睦教道湮微大抵學者安於苟簡流於俗習動作飲食之間揖讓伏興之節或愆禮正圓覺雲外法師清規之書所以立也識者足以副其誠昧者足以防其失蕩近世之流弊創千載之宏規可不務乎至正七年春住天竺靈山教寺比丘大安序至哉大雄氏之化權也行己化他兼該無遺矣使諸祖之居鷲嶺乞食城中安禪樹下行己之道則同使諸佛而住叢林三千威儀八百細行化他之法亦不得而廢焉及茲像教之季衆愈盛而道則微法愈興而魔則熾噫亦必有由矣往歲龍翔笑隱師校正百丈清規定為九章綱領粲然將以救夫禪林之弊今圓覺雲外師復修教苑清規折中古今𨤲為十類類以小序標表之視白雲堂舊所傳則加詳焉嗚呼禪林之規既如彼教苑之規又如此規乎矩乎在夫據大床大席者發號施令躬行而人率化則何憂夫魔之弗弱道之弗隆也是則名為報佛恩而國恩之報亦不外是是知從魔事者辜皇上之心行數規者其續慧命之種歟且國朝先教而後禪律是不可不修其書以張教本於是集也雲外師請翰林學士晉卿黃公為之序序所不及者復俾野人掇而補之善業所在夫何敢辭因時紀事覽者勿責其蕪穢焉至正七年七月七日靈石山登善菴主張雨書增修教苑清規目録天竺大圓覺教寺住持比丘自慶編述卷上祝讚門第一聖節每日祝讚景命四齋日祝讚藏殿祝讚初八日草三日千秋節善月祈禳門第二祈禱接官祈晴祈雨祈雪救日救月遣蝗謝晴謝雨報本門第三如來降生如來成道如來涅槃國忌智者大師忌諸祖忌開山歷代祖忌嗣法師忌檀越忌住持門第四議舉住持請新住持發專使專使到彼山專使特為新命煎點山門管待住持并專使新命辭衆上堂茶湯西堂頭首受請專使特為受請人煎點付承嗣法衣山門管待受請人并專使受請人辭衆新住持入院入院山門請新命齋開堂祝壽山門特為新命茶湯當晚普説檀越祠堂祖塔炷香諷經管待專使留請兩序報謝參訪出入交割什物兩班勤舊煎點新住持住持常用朔望上堂朔望僧堂并寢堂點茶會兩序耆舊茶湯位次會西序茶湯特為大諸山煎點諸山到方丈煎點住持施主入山諸山相訪尊宿尊長法眷嗣法平交鄰對退院兩序門第五西序頭首前堂首座後堂首座懺首書記維那知客侍者燒香書狀請客衣鉢東序知事都監寺監寺副寺典座列職知殿知藏知浴淨頭水頭莊主監收請名德都講兩序進退侍者進退頭首寮舍交割什物方丈管待新舊兩班請兩班歸位攝衆門第六剃髮儀白席諸師謝恩䇿導禮佛落髮付衣皈依開嚴祝贊受戒護戒辨道具三衣坐具鉢偏衫裙直裰濾水裊錫杖主杖如意拂子淨瓶香爐奩刀子數珠遊方參請求住參堂大名勝作住江湖名勝求住遷齋謝挂塔請益卷下安居門第七出草單出圖帳啓沙水結制都寺特為住持首座大衆湯讀清規榜住持特為首座大衆茶前堂特為住持後堂大衆茶住持兩班點行堂茶直日須知爾須知式修大悲懺法住持開講經行諷誦施生布薩儀附梵音聲圖都講頭首開講維那點讀三科習讀鎖試蘭盆會解制附廣儀略儀誡勸門第八立制法國清百録授菩薩戒儀教行録金園集別立衆制天竺別集訓知事人國清百録警䇿將來日用軌則坐堂普請訓童行月分須知真歸門第九住持示寂入龕請主喪請喪司職事孝服佛事移龕挂真讀遺偈大夜上祭繫念出喪挂真奠茶湯茶毗全身入塔靈骨入塔唱衣下遺書管待主喪及喪司執事人亡僧抄劄衣鉢浴亡入龕諷誦請佛事估衣伴靈大夜上祭繫念送亡茶毗唱衣入塔板帳法器門第十鐘版木魚椎磬鐃鈸鼓增修教苑清規目録終
