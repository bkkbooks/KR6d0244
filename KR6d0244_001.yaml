釘掛帳幕設位行禮如常式藥石畢復請湯果皆請兩序光伴侍者覆來早上堂致謝次早請湯侍者燒香問訊揖湯行者問訊僕從聲嗟請粥粥罷請茶侍者再稟上堂半齊點心如大尊宿則首座衆頭首稟住持勸請為衆開示法要住持先到客位陳意若允首座具狀兩序大衆同詣客位插香拜請次請住持引座掛牌報衆法座前左右排位至時鳴鼓住持同下法堂位前立住持先引座與常上堂同下座兩班詣尊宿前問訊尊宿往住持前問訊歸中普問訊登座侍者兩序出班問訊住持問訊說法畢下座住持前問訊普與大衆問訊住持兩序大衆隨詣客位插香拜謝請客侍者具狀請特為管侍山門置食備䞋方丈備貼䞋兩班光伴行禮與常特為同若法眷尊長至先講諸山相見禮畢講居中座住持插香禮拜講法眷禮方丈內坐當讓中位親自燒香客力辭侍者行禮迎送如前若嗣法辦事法孫相訪當躬至方丈住持即令鳴僧堂鐘集衆人事先請住持中坐行弟子法眷禮次講諸山禮接送同前但特為管待請客侍者炷香稟請不具狀凡諸山相訪大小遠近不同若大諸山當迎接如前尊宿禮若次諸山平交者斟酌中禮可也若比近鄰封從簡者徑造方丈免勞衆迎接禮如常式請升座請管待狀式當寺首座比丘某右某輒以來日拜請舉揚宗旨開示後學伏望尊慈俯埀開允謹狀年月日具位狀當寺住持比丘某右某輒以今午就寢堂聊備蔬飯伏望尊慈特埀降重謹狀年月日當寺住持比丘某狀可漏子狀請某處堂頭和尚法師具位謹封退院住持若年老有疾不任化導則雍容揖遜求賢以自代或心力疲倦或緣法不順自宜知退常住錢物須要簿書分明方丈什物點對交割具單目一樣兩本茶會兩序勤舊僉押用寺記印住持庫司各收一本為照公請一人看守方丈至退日上堂敘謝辭衆下座親往撾鼓三下而退若留本寺居東堂相繼住持者須當盡禮溫存住持門第四兩序門第五兩序之職皆為衆設紀綱叢林講行禮度流通教觀模範後昆于是繫者曰西序焉幹蠱寺門出納帑庾公心竭力纖芥分明于是務者曰東序焉作興法社於斯二者如身二臂豈可偏乎古人交互職之備歷繁重及歸師位世出世法任運應用無不適宜今岐分為二者以至於東西相視若傳舍之閲過客甚而相詆不相客者何哉蓋始度者不間於教訓又任者不擇其賢否故然耳惟主斯柄者慎之慎之西序頭首凡七職前堂首座叢林表率人天模範專務說釋開發後昆領衆則中規合矩赴堂則瞻前顧後齊粥精粗勉諭執事僧行失禮依法訓懲三軌匠物常切在懷部味教觀如憑几杖垂恤老病津送死亡叢林之事皆悉舉行然雖尊宿碩德若住持以禮待之亦為人而出不以名位為較也如諸大士贊揚佛化猶文殊之助釋迦觀音之輔彌陀皆是古佛權現為衆上首如此論之豈輕任乎後堂首座位居後板輔贊宗風講說軌儀晚生標格舉行禮樂不異前堂蓋為衆多故分兩職既領此任幸勿忽諸懺首三昧懺法惟自山家任斯職者宜須解行全備若自既昏昏焉能使人昭昭務在表率行人朝夕䇿導敷陳啓白若對聖賢坐誦繞旋常存觀道能障所障皆泯能懺所懺俱忘終日加功終日無作先以無生理懺為主方用事儀事行既勤理觀彌進當慕慈雲以為標格或謂圓頓無如是行良可愍焉書記山門榜疏書問祈禱詞語應係文翰皆掌之然住持專柄大法何暇文字而此職固不可缺董斯職者洞曉宗乘兼通外典亦非一日功也且禪宗何其多而斯宗何其少非謂無其人蓋與維那位次高下故退藏而不為也若禪宗書記位居首座之下用彼格此合居懺首之上蓋山家懺首此任非輕良以宗說俱通解行全美與首座等耳書記位不可加其右者蓋由此焉本宗維那曾歷燒香知客等職兼復點讀說文祈禱回向歷事繁重若五山十剎者職漏亦預保舉又烏得肯復讓之今立論云若請書記亦曾先歷侍者知客等職然後量材擢用助教海波瀾折衝外侮亦須兼講說文則位外維那之上職滿預保永為定式昔上竺佛光會中有此山在書記敕黃為之名出班書記豈維那不遜耶若越次直上問祈招之詩不知者不在此論也維那綱維衆僧委曲調攝衆有爭競辨析和會堂僧掛搭驗度牒真僞或臘圖位排列審詳僧衆病亡調理津送給假參假觀時舉行回向祈禱極宜至誠或有他緣或暫出入致委客司權令攝之點讀說文務開新學說或布薩珍重毗尼天台忌辰盡禮修敬厥職煩難莫越于此寄歸傳云維那華梵兼舉也維是綱維華言也那是梵語刪去羯磨陀三字也僧史略云梵語羯磨陀那譯為事知亦云悅衆謂知其事悅其衆也又聲論翻為次第謂知僧事之次第也音義指歸云僧如網假有德之人為綱繩也知客職典賓客凡諸方尊宿官負檀越方來名勝迎接交談禮宜典雅隨令行者通報方丈然後陪上相見量人重輕斟酌行事其旦過寮常備柴炭燈油溫存暫到法堂誦文湯茶照拂僧堂粥飯管顧客僧暫到死亡主其喪事堂僧圓寂同管收支維那在假攝行其事行遠在邇幸勿自夷方溪嘉聲逮今未墜侍者燒香書狀請客附衣鉢入室真子朝夕侍教期契心宗觀出處語默之間傳部味教觀之首慶喜之侍瞿曇章安之侍天台佛祖重寄其可忽諸凡住持開講則點對部文預分科目若講唱製作咨稟所以記録勿忘習讀問答鎖試取士當以至公輔贊法社節臘特為通覆相看挂搭燒香行禮等事燒香侍者之職也凡住持往復書問啓札製作文字先具草呈如缺書記山門一應文翰代之書狀侍者之職也凡住持應接賓客管待尊宿節臘特為具狀行禮請客侍者之職也或維那知客俱不赴衆或在假其行事三侍者皆當攝之若住持久出則歸衆行立暫出則不離班位衣鉢侍者之職不立班蓋能納忠救過羅致人才內外庶事通變圓融庶得上下雍容東西和順若非叢林老成不可任此毋使後生晚輩亂行敗德被誤非輕東序知事凡四職都監寺佛世設營事比丘幹辨衆事乃古之監院今之都寺也總寺門之庶務勤香火於朝夕祇接官員禮輅施主出納錢穀潔己公心簿書時時稽考歲計種種有餘訓誨行童役使僕𨽻儻有過失量情擯罰毋恃威暴惹起事端莊庫職務舉用均平供衆修造常運勝心接物待人不可輕慢施舍己責振廢滯節器用齊粥二時心須赴堂行僕行益自然整肅巨細事務咨稟住持而行庶見行不失職衆無謗言夕惕若栗則善始終若苟圖其身以求厚焉欲免得乎任斯職者關係非輕住持必擇其廉能公謹臘高歷事為衆推服者預以禮聘之然後衆請職滿送歸單寮且古之單寮勤舊雖大剎數不滿十蓋求其賢能廉幹之艱耳果得其人或連年不易或數請再充為其無取於公乎若神照之佐四明石窗之輔宏智可為龜鑑寶積經云佛告迦葉我聽二種比丘得營衆事一能持淨戒二畏於後世復有二種一識知業報二有諸慚愧及以悔心復有二種一阿羅漢二能修八背捨者如是二種我聽營事監寺山門事務都寺總之蓋以衆多復設監寺應有常住金穀錢帛米麥出入隨時上曆收管支用令庫子每日具收支若干僉定飛單呈方丈謂之日單或十日一次結算謂之旬單一月一結一年通結有無見管謂之日黃總簿外有米五味各簿皆須考算凡常住財物雖毫末並是十方衆僧有分如非寺門外護官員檀越賓客迎送慶吊合行人事並不可假名支破侵漁其上下庫子須擇有心力能書算守己廉謹者為之若有病僧合用供給之物即時應付如倉庫疏漏鼠侵耗米麥蒸潤一切物色頓放守護並須及時照管母得暴殄副寺副寺之職蓋副二監寺分勞也常住錢糧眼同出納務在公心母相私蔽供給所需常令備足缺乏預謀上首尅落常慎下流每日措辨柴薪至夜巡警火盜責任非輕宜加竭力典座僧中淨食蓋緣資益色身身安則道隆道隆則本立故典斯職者常懷真心供養可也二時粥飯一切齊供當須精潔務在豐饒物料調和撿束局務至於粒米寸薪不許棄賤粥飯上桶先望僧堂焚香設拜次發過堂二時就厨下粥飯食不異衆訓誨行者習學經書行益普請毋得怠慢循守規矩均俵同利撫恤園丁栽種蔬菜及時耘灌不致荒蕪供給堂厨常令富贍傍公作善宜運是心列職凡七職知殿常淨几桉時滿燈油聖像頻常拂塵供養每日修設或遇風起須滅香爐內火結起幡腳勿近琉璃凡遇節候四齊日開設殿門以便往來瞻禮其施主香錢油錢不得互用亦任施主隨心喜捨切勿苦覔令生猒心知藏輪藏乃梁傅大士愍世人不誦經文及不識字故於雙林道場創轉輪藏以奉經卷其誓有曰有能信心推之一匝則與誦經其功正等今諸方倣之蓋重法也掌斯職者常加點對函帙銓次目録於中缺者完之損者補之潤者焙之斷者粘之凡請經看誦者逐函點付看畢一一交收入藏庶免散失知浴凡遇開浴齊前掛牌寒月五日一浴暑天每日淋汗鋪設浴室掛手巾出面盆整把鞋鋪腳布參頭差行者直浴齊罷浴頭覆維那首座方丈畢鳴鼓三下浴聖桶內皆著少湯燒香禮拜想請聖浴次第巡廊鳴板三下遍鳴鼓第一通僧衆浴第二通末頭首浴第三通行者浴三通末知事浴第四通人力浴監作行者居末浴就彈厭之住持例在三鼓入浴小閣脫衣浴中用屏風遮隔行者若有故二鼓入浴不用屏遮亦不入閣只就領首板頭解衣浴室外刊揭入浴資次浴室內掛白字小牌鳴板一聲添湯二聲添水三聲則止浴中誡勿喧閙浴罷照管火燭如施主設浴則課經回向蓋妙觸宣明成佛子住則事無虗設矣淨頭掃地裝香換籌洗廁燒湯添水須是及時稍有狼籍隨即淨治手巾時常潔淨琉璃終夜長明淨桶把鞋檢點添換凡供此職皆是自發道心耳水頭預積柴薪午夜燒湯供大衆沃盥須早排面盆點燈燭備牙藥常洗手巾乾淨冬月烘焙毋得湯冷失事令衆起念莊主莊乃僧衆喉襟山門諸事所係根本近時叢林凋弊始自於莊皮之不存毛將安傳今略舉一二以為懲勸一謀莊職競起爭端莊少人多安能遍及搆怨住持上下不陸一也一充其職離寺相遠靡所不為致爭起訟供衆錢糧盡皆耗費復積重逋以纍于後因而紀綱不振莊佃生侮租課不還二也縱使老成能事充之而州縣應酬吏胥管幹鄉都職役鄰里富豪皆合追陪既啓其端稍有不及便生釁隙雖不明支而巧立除破莊門之費倍於寺門三也請住持勤舊毋循私情協心謀議委廉幹潔己者充之慎勿輕舉莊主至莊修理莊舍補治塍塘提督農務撫安甲佃些少事故隨時消弭事關大體申寺定奪毋事刻剝竭力運謀使火佃有追思之心常住有羡餘之益方稱厥任也監收諸莊督斂衆僧命脉請非其人為害不少皆由住持耆舊私任匪人者有之因利曲徇者有之為耆舊執事人連年占充者有之托勢求充者有之樹黨分充者有之角力爭充者有之蠧分害私不可枚舉雖欲匡救末如之何儻得廉正勤舊輔佐住持公選區用加禮敦請至莊所日點對簿書分由甲佃禳保莊門加功課誦勿縱淫祀恣害物命選日開倉立限收米趂於天晴督責上倉看辨米色毋相私隱斗斛出納務在公平預留齊糧津發歸寺三限取足結帳明白克己為念奉衆為心毋苛取甲佃毋虧損常住則道福自然殊勝矣請監收日會兩序耆舊茶請仍備管待至下莊日山門首講茶湯禮鳴鐘集衆門送請名德都講大方都講叢林宿德人天師範宗乘唱導法道係焉禮宜嚴重委曲控陳再三勸請如有允意住持請兩序歸方丈獻茶白云此間多衆宜得哲人講演說釋山中幸有某人學識高明教道所係煩兩序同詣彼寮拜請為山中都講白畢同至彼住持插香同觸禮一拜起詞云大衆傾心久思示誨伏望慈悲特賜開允答云幸獲依棲貴圖藏拙既蒙見舉不敢有違次日特為上堂舉揚盛德仍伸請辭下座同大衆座下爐前拜請畢即請同上方丈燒香獻茶兩班耆舊光伴茶罷堂司行者鳴僧堂鐘大衆同送歸寮住持對觸禮一拜送出次兩班大衆問訊畢即詣方丈致謝兩展云云三觸仍往庫司諸寮問訊方丈備草飯至晚藥石湯果別日管待並請兩班光伴此職若專講說則行道在頭首之後大衆之前若兼前堂位居班首進退不混兩序無交代也如都講辭免住持上堂則就寢堂請與請兩班禮同兩序進退頭首乃叢林表率務擇才德相當者為之近競奢侈飲食財物為事使守貧抱道之士愈甘退藏法社何能振興知事乃山門重任務擇廉能相稱者充之古制大剎不過五人今行院額設亦有定例近多徇私雷請歸庫祇圖豐己未嘗念公常住漸虗法門日弊原究其始咎歸誰乎若兩班職事滿日待昏鐘鳴同詣方丈插香觸禮一拜稟退知事就納庫記鑰匙其中或有再留者住持就便委曲和會不允其退次早親到彼寮侍者燒香點湯勉留若新請兩班不可率爾與其不得其人不若不求其備若果相稱未允所請須委心腹人展轉和會惟首座都寺必住持親往和會至請之時住持須具所請人目并舊兩班耆舊令客頭行者請粥罷會茶其舊知事於內僧堂前候行粥遍直日人出則入聖僧前問訊燒香三拜從聖僧厨後至椎邊鳴椎一下云某等昨蒙方丈和尚令歸庫司充知事一年已滿心力勞倦告退歸寮謹白再鳴椎一下往住持前觸禮一拜巡堂一匝中間問訊而退粥罷行者催請新舊兩班及耆舊新兩班或請客侍者請至寢堂住持接入坐侍者燒香茶畢住持躬起燒香衆起立伺住持歸位皆坐住持白云前兩序告退此務不可缺人今講某人充頭首某人充知事逐一標名清訖所請人進前遜辭住持與大衆歸左邊所請人歸右邊對觸禮一拜敘寒溫畢侍者揖新兩班歸特位朝裏列於兩邊坐定侍者燒特為香即至特位前問訊退歸中立待行者下湯侍者再到特位前揖湯鳴法鼓一通復歸中間問訊燒光伴香一炷湯畢鳴僧堂前鐘集衆送新兩班歸寮先住持送次舊兩班賀次大衆賀畢住持同大衆送舊兩班歸寮畢新兩班懷香詣方丈拜謝令堂司行者引報處寮住持請草飯湯果管待等如常式維那僧知事退職亦僧堂行禮與知事同侍者進退請兩班畢舊侍者詣住持前咨稟云某等久侍和尚今欲告退伏望慈悲插香大展三拜而退住持令左右人和會新侍者定了後批下堂司維那先請首座并請為侍者人到維那寮問訊坐定燒香點茶畢再燒香朝首座叉手白云奉方丈和尚慈旨請其上人充某侍者云云逐一白訖首座轉身同維那主邊對侍者普觸禮一拜不講湯禮即同出門送首座畢維那引侍者上方丈住持出維那進前稟云適奉慈旨令請某人充某侍者今引炷香禮拜住持居中坐維那側邊坐新侍者插香大展三拜衣鉢侍者即出接入內室喫茶即令行者請知客上同維那與衣鉢侍者送新侍者歸寮其餘頭首等次第作賀知客光伴巡寮方丈直廳挑燈堂司行者報寮方丈聽呌請新舊侍者當晚藥石湯果並就方丈內室衣鉢侍者相伴赴謝必須到住持前問訊凡方丈請兩班頭首等則侍者必須別席或頭首寮或庫司或他山來就方丈煎點侍者同席無在頭首寮舍交割什物寮舍什物常住置辨不易往往職事人視為傳舍及進退時僕輩搬捵蕩然一空使新人入寮舍者茫無所措庫司當置簿一𠕋具寫諸寮交割什物住持知事僉定仍分置小簿付諸寮兩相見對同凡頭首交替庫司令下庫同堂司行者對簿點數縱有損者必須無物公界修補失者本寮陪償缺典之物庫司措辨增號上簿庶免走失頭首寮舍住持禮合照拂若視如常甚非尊賢任能之意為頭首者既辨己事亦宜相體此是履歷發軔之本耳方丈管待新舊兩班先一日午後令請客頭請新舊兩班仍請耆舊光伴次日午刻催客住持出接坐定坐次與請時特位同侍者燒香先至新頭首特為前總問訊次至新知事特為前總問訊轉身燒光伴香入卓點湯下食畢至行飯時燒香下䞋飯畢燒香點茶鳴法鼓一通侍者如前到新兩班前問訊畢再燒光伴香茶罷鳴鼓三下退席兩班致謝住持送請兩班歸位請兩班後至第三日參前住持令行者至新兩班處請云方丈和尚請來早就寢堂獻湯歸位次早開長板時催請至方丈住持接坐侍者燒香獻湯候鳴殿鐘住持同至大殿門首一人侍者問訊頭首請歸西班一人侍者問訊知事請歸東班舉呪行道回向畢赴堂侍者候兩班入僧堂門依上各揖請歸鉢位供頭送鉢兩序門第五攝衆門第六道非衆弗傳衆非處弗居故叢林之所由設也吾祖智者妙悟法華而以止觀之道化被六十餘州所至景從纍數千百人曾不以衆為嫌也臨寂語門人曰吾以領徒太早損己益他蓋慮後人不修內行外招名譽者所深誡也雖然獨學寡聞世教尚譏況出世妙道不求之師友疇能有聞乎哉邇見簦笈之士不憚勞遠一入於衆惟汲汲聲利之求鮮不為盲衆所導者矣苟能存意於古道則不患名不立也剃髮儀凡十科度僧乃續命傳燈佛法所係之大事必擇行堂屢試屢中可適器任者為之而國朝屢降試經度僧明詔非不嚴重初不為黨名固位而設也一有黨固之病而根于心而收凶厲纍至于百而未足遺毒之慘使佛再世亦莫理也告切慎之行者初受度牒以柈袱托呈本師及兩序各處插香體三拜復請首座䇿導維那引請并梵音師選日設供落髮作法之處律制令露地香水灑之周匝七尺四角懸幡今時不定或在法堂法座上須設像香華供養座下左右設二師位并几几上安香燭花瓶戒尺排大衆坐位并作梵師位若在大殿亦然但二師之位宜對佛若在僧堂住持分手設䇿導師位聖僧座右設梵師位與䇿導師相對得度人隔宿更衣沐浴就行堂點茶辭衆剃頭留四圍八髻并頂心周羅梵語周羅此云小髺復令堂司行者報寮掛牌至日粥罷鳴鐘集衆方丈請䇿導師歸寢堂分坐伺鐘絶起身同至作法處歸位坐定行茶於行堂用二卓以柈袱置袈裟度牒於上鳴鈸并引得度人出到土地堂祖堂佛殿各處炷香禮三拜畢就作法近處立伺待䇿導其間教誡引用因緣當隨機開示不必定一今且作一途示法具列十科一白席二請師三謝恩四䇿導五禮佛六落髮七付衣八歸依九開發十祝贊一白席衆集已維那起身鳴椎一下作梵師作優波利梵具說戒章但改說戒二字為落髮聲絶又鳴椎一下大衆說偈云戒香定香云云首座白席云惟西方大聖人之垂化也貫古今而不息周細大以無遺者其惟度人出家之制歟蓋剃髮披衣乃三世如來之儀範出塵離俗為十方檀信之福田黨能一日發心尚獲諸天勝報原夫能仁降迹當午夜以逾城方便垂慈越六年而成道雷音既震善來先度於五人法雨才沾羯磨繁興於四海洞啓菩提之路廣開解脫之門暨後漢明皇感日光之通夢摩騰大士施神化以應機雖萬乘以皈依曾魔外之未服故經文聖像憑烈𦦨以儼存致正信大心弃冠簪而求度一時如司空劉峻等二百六十人京師士庶三百九十人王宮妃子一百九十人道士呂惠通等六百二十人並發心出家釋種從茲競秀曇華自此聯芳由漢永平迄今越一千三百餘年無論男女窮達皆得出家紹隆釋種人到于今咸遵明訓今有本寺行者某人正因出家歸心聖教克勤道業人稱善焉今奉帝恩許容披剃將從和尚乞求落髮若準律文必須單白羯磨和僧使大衆知和合者善或復房房語令知委然此行童發心精進衆所知聞羯磨之詞不繁宣秉直令教授座主引入道場與其披剃謹白若準律文因諸比丘輒度人故為俗譏訶由是佛制凡伽藍中剃髮者必須單白和僧意令合界通知內無專輒外絶譏訶故當稟律科儀先作羯磨可也和尚秉法闍黎答法問僧集否答僧已集問和合否答和合問不來諸比丘說欲及清淨答此無說欲及清淨者問僧今和合何所作為答剃髮和僧單白羯磨和尚云大衆合掌聽作白大德僧聽彼某甲欲求某甲比丘剃髮若僧時到僧忍聽與某甲剃髮白如是問作法成否答成和尚云作法既成請教授座主引入道場二請師引請師引行者至佛前禮三寶三拜引至和尚前禮三拜胡跪合掌引請者云夫儒敦事父唯重於成身釋制依師務存於學道故使四儀軌範籍此以琢磨五分法身因茲而成立理宜竭誠事奉故當克志陳詞恐汝未能我今教汝若言某甲處當稱自己名其餘言詞皆隨我道唱云大德一心念我某甲今請大德為剃髮和尚願大德為我作剃髮和尚我依大德故得剃髮出家慈愍故三說和尚答云汝既殷勤三請我當為汝作剃髮和尚行者就禮一拜起引請師引至䇿導師前禮三拜胡跪合掌引請師教申三請白云夫猒處凡流欣參寶位將欲剪除於俗態理宜警䇿於蒙心矧在當仁必由名匠今為汝請某人為落髮阿闍梨而況此師誨人無倦接物有方故須專秉一心恭陳三請恐汝未能我今教汝若言某甲處當稱自己名其餘言詞皆隨我道唱云大德一心念我某甲今請大德為落髮阿闍梨願大德為我作落髮阿闍梨我依大德故得剃髮出家慈愍故三稱䇿導師答云汝既恭陳三請我當為汝作落髮阿闍梨所有教示當須諦聽三謝恩䇿導師允請即就座為說云善男子須知出家之士高超物表為世福田君不得而臣父不得而子應受人天恭敬供養是故剃髮著袈裟已即參預三寶聖賢之數雖君父且無設禮之儀況餘人乎以是則知非細事也然而父母生汝養育恩深國王許容度汝其功亦大汝今應往明顯處拜謝國王及父母深恩厚德然後却入道場為汝落髮行者就禮一拜起引請師則引出明顯處燒香先拜國王再燒香拜父母說辭親偈引請師教行者逐句隨念唱云流轉三界中恩愛不能捨棄恩入無為真實報恩者四䇿導謝恩畢乃脫俗服出清信士度人經去中著偏衫入䇿導師前胡跪聽受法訓蓋聞束髮簪纓世俗顯成人之美毀形壞服釋門彰入道之基所謂選佛於僧心空及第者也善男子汝今既慕為僧合究為僧之志且如何是為僧之志須知道為一切衆生開佛知見是為僧之志為一切衆生示佛知見是為僧之志為一切衆生悟佛知見是為僧之志為一切衆生入佛知見是為僧之志若也果能如是為僧果能如是用心之時便可變大地作黃金攪長河為酥酪供養於汝未為分外若坐玩歲月虗消檀施外若四儀之肅肅內實衆善之荒荒以之望道如南轅而適燕以之諭理如蒸沙而作糜吾末如之何也己慎誡之哉慎誡之哉不可自欺也䇿導畢師執淨瓶以香湯灌頂說偈讚云善哉大丈夫能了世無常捨俗趣泥洹希有難思議此偈䇿導師唱或引請者唱行者隨聲應和五禮佛䇿導師復云善男子既灌頂已得去王之子更須先往佛前禮十方諸佛行者就禮一拜起至佛前禮三拜說皈敬偈云歸依大世尊能度三有苦亦願諸衆生普入無為樂引請者唱行者逐句隨和六落髮禮佛竟引請者引至䇿導師所近前胡跪以淨巾圍肩師說云善男子汝無始來莫不增長憍慢貪海納流致使流轉生死不能休息我今為汝剃除鬚髮為除憍慢著壞色衣為除貪愛少選之間即與三乘賢聖儀相無別可謂慶幸夫剃除鬚髮乃表三界九地煩惱四圍之髮表下八地思惑我與剃除頂上周羅乃表非非想處第九一地煩惱此惑最後難斷當往和尚處求為剃除汝當志誠莫生愛著鳴引衆念出家唄云毀形守志節割愛無所親出家弘聖道誓度一切人出度人經七圓頂授衣䇿導與剃四圍髮竟留頂上周羅至和尚前胡跪合掌和尚問云今為汝去頂髮可不答爾和尚云善男子剃其髮所以去貪欲而斷虗妄壞其衣是乃捨飾好而安淡泊如昔阿闍梨與汝剃四圍髮者表破下八地思惑今則與汝去頂上周羅表破非非想處上一地煩惱此惑難斷才斷此之煩惱方曰出家蓋出三界家也則可起萬劫之沉淪成佛道之軌則可貴可尊慎勿輕易和尚為灌湯剃頂上小髻衆人再念出家唄如前云云準知落髮本是和尚恐其煩久故請闍梨為除餘髮者但留少許和尚親今時先自剃作小髻非本教意剃落已竟和尚授與袈裟便頂戴受受已還與和尚如是三反和尚與著之出善見論說偈云大哉解脫服無相福田衣披奉持戒行廣度諸衆生善男子汝剃除周羅已竟我今當授汝衣然此衣者準律制說即五條是也梵語安陀會華言作務衣須知此亦大僧所受用物若沙彌應依法著縵衣無相條者類時制方袍服也今既初出家當受三歸戒借著無在也坐具亦云隨坐衣梵云尼師壇為護身護衣護僧臥具故置左臂袈裟之下凡著袈裟不得向佛塔上座三師亦莫背不得口銜及兩手奮當如法受持名良福田不可慢易八歸依䇿導師前胡跪合掌聽說善男子汝今外儀已具必須內解更明內外相應方為盡善若準毗尼母論云剃髮著袈裟已然後授三歸五戒十戒等然此五戒十戒於登壇時當自授受庶免破戒成障也且今為汝翻邪歸正授三歸依蓋翻無始邪心歸乎三寶正覺從今已後盡此形命誓依佛師誓學法藏誓同僧海汝當志誠隨聲稱唱引請者導唱我某甲盡形壽歸依佛法僧例佛三說我某甲盡形壽歸依佛竟盡形壽歸依法竟盡形壽歸依僧竟惟願三寶哀憐攝受沙彌禮佛行繞三匝阿闍梨一說或三說九開發教誠授三歸依已告云善男子汝今已遂出家已除鬚髮已著袈裟已是與諸佛列聖同其儀表古德云出家乃大丈夫事非將相之所能為以其可以弘荷三世佛乘可濟九流諸有是誠非細務也自今而往慎勿怠墮唐喪光陰如吾佛世尊臨滅度時遺教有云汝等晝則勤心修習善法毋令失時初夜後夜亦勿有廢中夜誦經以自消息無以睡眠因緣令一生空過無所得也是則依佛法僧修出家行起精進心遠離諸惡當須咨白本師置辦三衣一鉢用擬受戒此衣鉢者乃是三世諸佛正儀賢聖沙門標致九十五種外道尚不知其名字唯佛出世示此未曾有法若不自辨或臨時假借當準律明判定不得戒由無戒故一生虗受信施將來當隨惡道長劫輪回無由解脫此非小事切宜用心必須擇從明師受具足戒然後篤學大乘闡揚教觀期登品位繼續祖燈實吾之至望也勗哉學子毋怠毋忽汝今當往佛前禮敬三寶陳自慶偈沙彌至佛前三其胡跪偈云引請者唱沙彌隨說善哉值佛者何人誰不喜福願與時會我今獲法利十祝讚或和尚或闍梨或引請或表白皆可應執手爐上香維那鳴推一下回向云上來剃僧舉揚佛事所集功勳奉祝上界天龍八部梵釋四王此土神祇伽藍真宰各展威神安僧護法今上皇帝聖壽萬安文武官班常居祿位師僧父母善惡知議十方檀信法界衆生承此善根俱登彼岸念清淨法身毗盧遮那佛十號云云畢作唄處世界如虗空云云滿散沙彌至本師前禮三拜禮䇿導師三拜禮大衆三拜畢出門外下手立衆出問訊畢詣本師前插香大展九拜詣各寮禮謝每日早晚二時至本師前問訊咨稟參堂禮如后式受戒護戒夫戒是正順解脫之本三學之要門衆善之初章尸羅不清淨佛法不現前三世諸佛歷代祖師未嘗不因戒而入道若不受戒非大僧數是故應須受戒受戒之後復須護持五戒十戒二百五十戒大乘十重四十八輕戒毋得有犯犯戒之罪如鏡對像果報昭然思之察之辦道具凡一十七物將入叢林先辨道具中阿含經云所蓄物可資身者即是增長善法之具菩薩戒經資生順道之具三衣三衣者大衣七條五條也味者呼七條偏衫裙為三衣非也一僧伽梨義翻雜碎衣以條數多故亦名衆集時衣入王宮聚落乞食說法時著又大衣分為三品每品有三下品九條十一條十三條兩長一短中品十五條十七條十九條三長一短上品二十一條二十三條二十五條四長一短二多羅僧此云上著衣即七條也兩長一短名中價衣從用云入衆時衣禮誦齊講時著三安陀會此云中宿衣謂近身住也五條一長一短名下衣從用云院內行道雜作衣衣名福田者僧祇律云佛住帝釋石窟前見稻田畦畔分明語阿難言過去諸佛衣相如是從今依此作水衣增輝記云田畦貯水生長嘉苗以養形命法衣之田潤以四利之水增以三善之苗以養法身慧命也田衣之相如圖袈裟此云不正色染從色得名會正云準此是草名可染衣故將彼草目此衣號亦名壞色即戒木中云三種壞色一一色中隨意壞若青若黑若木蘭僧祇謂青銅青也黑謂緇泥涅者木蘭謂樹皮可染作赤黑色然此三色名濫體別須離俗中五方正色及五間色凡製三衣當用布不許絹細者豈可用殺生之財而為慈悲之服智論云如來著粗布僧伽梨然其衣體須求厚密離諸華綺律云若細薄生疏蕉葛生𥿾並不可用綾羅錦綺紗穀細綃並非法物今多不信佛語貪服此等諸衣然此三衣皆須加法加五條法云大德一心念我比丘某甲安陀會五條衣愛一長一短割截衣持三說餘二衣法例爾可知坐具梵語尼師壇此云隨坐衣亦云坐具如此方橙褥之類僧祇云律應量作長佛二搩手準五分佛一搩手周尺二尺則今長四尺也廣一磔手半即三尺也製法色同袈裟鉢梵語鉢多羅此云應器章服儀云堪受供者用之名應器今略云鉢又呼云鉢盂即華梵兼名也善見云三乘聖人皆執瓦鉢乞食資生四海為家故名比丘僧祇云鉢是出家人器非俗人所宜十誦云鉢是恆沙諸佛標志不得惡用佛制聽用瓦鉢鐵鉢律云大要有二泥及鐵也出曜經云如來成道已經七日三賈客獻食佛不欲受當觀過去諸佛為用何食諸天空中過去諸佛皆用鉢食天王即奉鉢非巧匠所造自然成就復念四天四鉢取一捨三則非其宜盡取按為一鉢又如佛本行集經十誦律云鉢半鉢大鍵𨩲小鍵欽鍵音虔𨩲音咨經音疏云鉢中之小鉢助鉢用故四分律云鍵𨩲入小鉢小鉢入次鉢次鉢入大鉢此律言小鉢即十誦大鍵𨩲也次鉢即半鉢也鉢支律云鉢不正聽作鉢支偏衫律制只有僧祇支此云覆膊衣亦云掩腋衣此長覆左膊及掩右掖以襯袈裟又制覆肩華言覆肩梵語未詳掩於右膊但西土人多祖膊恐生譏過故須掩之然此二衣亦同袈裟畟方但無條葉耳此方往古並服祗支至魏時宮人見僧祖一肘不以為善始加右袖兩邊縫合謂之偏衫截領開裾猶存本相故知偏衫左肩即本祇支右邊即覆肩也今接領開脊者蓋是魏遺制也裙梵語泥伐散那唐言裙諸律舊譯或云涅槃僧或云泥洹僧或譯為內衣或云圌衣圌音船即貯米圓器似圌而無蓋乃取其圓義云也直裰相傳前輩見僧有偏衫而無裙有裙而無偏衫遂合二衣以為直裰濾水囊增輝記云為器雖小其功甚大為護生命即慈悲之意其在此也南山鈔有式樣文多不録若作漉水袋如杓形漉訖還著水中鈔云今有不肖之夫見執漉囊者言學律唯在於漉袋然不知所為處深損生妨道者猶不畜漉袋縱畜而不用雖用而不瀉蟲雖瀉而損蟲命且存殺生一戒尚不遵奉餘之威儀見命常沒其中根本百一羯磨云水羅有五種一方羅用絹三尺或二尺隨時大小作絹須細密不透蟲者僧祗云蟲太細三重作又用密練絹作若用疏絹薄紗紵布者本無護生之意二法瓶陰陽瓶也三君遲以絹繫口以繩懸沉於水待滿引出四酌水羅五衣角羅言衣角者非袈裟角也以密絹方一探手或繫瓶口或安鉢盂中濾水用也又四分律不得無漉袋行半由旬無者袈裟角漉衣角有二說不同然此五種是私用若置於衆處當準寄歸傳式樣用絹五尺兩頭立柱釘鉤著帶繫上中以橫杖撑開下以盆盛等慈覺大師賾公集經律凡三十一偈又多不録未謂世云濾羅難安多衆宗賾崇寧元年於洪濟院厨前井邊安大水檻上近檻唇別安小檻穿角傍出下安濾羅傾水之時全無迸溢亦五大衆沾足浴院後袈故此僧行東司亦皆濾水出家之本道也後住長蘆說井濾水二十餘處常住若不濾水罪皈主執之人普冀勉而行之錫杖梵云隙弃羅此云錫杖由振時作錫聲故十誦云聲杖三千威儀經云持錫不得入衆日中後不得復持日中即知時不得檐於肩上錫杖經云佛告比丘汝等應受持錫杖所以者何過去未來現在諸佛皆執故又名智杖又名德杖彰顯智行功德本故聖人之表幟賢士之明記道法之幢迦葉白佛何名錫杖佛言錫名輕也倚依是杖除煩惱出三界故錫明也得智明故錫醒也醒悟苦空三界結使故錫疏也謂持名與五欲疏斷故若二股六環是迦葉佛製若四股十二環是釋迦佛製定字五百問云持錫杖有多事能警惡蟲毒獸故主杖十誦律云佛聽蓄杖其𥎞用鐵為堅牢故斯蓋行李之善助也毗奈耶云佛聽柱杖有二因緣一為老瘦無力二為病苦嬰身故凡䇿杖若見尊宿并二師須投杖於地問訊或是二師杖必倚著處問訊若為二師操杖師有顧問必把杖以對之如意梵云阿泥盧豆此云如意狀如雲葉如此方篆書心字為人天師說法稱心而執此者外表儀相故曰如意昔隋煬帝請天台大師講經大師縱無礙之說肆縣河之辨稱悅帝心特賜犀角如意耳若釋氏要覽誠師所載云如意今講僧執之多是私記節文祝辭於柄備於忽忘要時手執目對如人之意故名如意據他所說只如文殊執之亦備忽忘邪今說法者多執拂子若私記節文不知又書於何處那庸鄙之談真齊東野人之語也拂子律云比丘患草蟲佛聽作拂子僧祇云佛聽作線拂列氎拂芒拂樹皮拂若𤚐牛尾馬尾并金銀裝柄者皆不得執淨瓶梵語桾稚迦舊略云軍持此云瓶常貯水隨身以用淨手寄歸傳云凡水分淨觸瓶有二枚淨者用瓦瓷觸者任用銅鐵出觸以觸水洗入淨以淨水洗香爐奩香爐奩盛香器也或云爐并奩乃二事也菩薩戒經或本云香爐無奩字刀子楞伽經云為截袈裟故聽蓄四寸刀頭如月刃今相承呼為護戒刀僧史略云戒刀皆是道具為割衣故刀名戒者蓋佛不許斫截一切草木壞鬼神村故草木尚戒況其他也數珠牟梨慢陀羅呪經云梵語鉢塞莫梁云數珠繫念修業之道具也木槵子經云昔有國王名波流梨白佛言我國邊小頻年冠疫穀貴民困我常不妄法藏深廣不得遍行惟願垂示法要佛言大王若欲滅煩惱當貫木槵子一百八箇常自隨身志心稱南無佛陀南無達磨南無僧伽名乃過一字如是漸次乃至千萬能滿二十萬遍身心不亂除諂曲捨命得生炎摩天若滿百萬遍當除百八結業獲常樂果王言我當奉行百八結者即見思惑見惑開為八十八使頌云四諦欲界三十二色無色各二十八三界共成八十八俱舍廣明如是義思惑合為十頌云欲界思有四謂貪嗔癡慢上二各除嗔共成十思惟已上見思共成九十八使更加十纏頌云纏八無漸愧燒慳并悔眠及掉舉昏沉或十加忿覆通前合為百八結遊方參請新學欲出遊方須擇有法可學處求掛塔準律云比丘有法有食處應住有法無食處亦應住無法有食處不應住初到且過具威儀推熟於叢林能事者一人為參頭同到客司白云暫到相看知客出接客云即日共惟判賓法師尊候多福久聞道譽獲奉瞻際下情不勝感激之至答云山門多幸荷蒙遠臨揖坐燒香獻茶略詢來歷客起謝茶歸且過或送客司圍爐等處安歇知客即回禮客接入問訊知客云即刻共惟諸位尊長法師尊候納福適承降重特此拜謝下情不勝感激之至答禮合相看何勸降重參頭自送知客出門若欲禮拜住持則先詣侍司相看行禮如前起身稟云某等特來禮拜和尚敢煩侍者通覆侍者揖再坐詢問來歷若在粥罷侍者即去欵坐少時客某通覆繼覆住持如允當時詣寢堂相看若在齊後侍者云請回安下處客某通覆則覆住持如允次日早鍾鳴侍者令客頭報相看如未暇侍者詣安下處報禮善言安慰粥罷參頭領衆詣寢堂侍者入稟住持出參頭進前云請和尚趺坐住持免即插香展具又免即觸禮一拜問訊詞云即日共惟堂頭大和尚尊候起居多福某等久聞道風茲者獲奉慈顏下情不勝喜躍之至畢參頭同衆側位就坐侍者燒香獻茶住持有問當實答不得多語起身爐前謝云重承降接特此拜謝住持送出參頭止云和尚尊重隨至侍司謝云適來有勞神用特此拜謝歸安下處侍者回禮參頭接入同衆問訊云移刻共惟高侍法師道體起居多福禮合詣寮拜看返辱降重下情不勝威激之至侍者云山門多幸特荷遠臨報謝稽遲下情不勝多愧若古禮住持恭往且過回禮重遠來也今則無聞但名勝相看就送客位回禮學子相看就法堂下間迎伺住持回禮免煩降重而五山大剎則不回禮半齊方丈請點心當晚藥石又當晚特為湯次日粥罷請茶之禮在住持行求住若求掛搭再詣侍司問訊少坐起身稟云某等慕仰和尚道風特來依栖座下拜煩高侍通覆侍者顉話具寫求住人諱呈覆方丈如允侍者次第求住持榜頭下堂司維那令行者請求住人茶接入燒香獻茶畢參頭起稟云某等適奉方丈慈旨令依附左右伏望甄録答云山門多幸同守寂寥參頭同衆各取度牒遞與維那上戒臘簿隨即付還送出歸下處各書方丈兩序寮舍門狀各人各寮一紙不得共名亦不可白紙標頭具名狀如後式復各備大香一片近有率香錢省是杜初心入道之路非佛祖流通之心凡百有位當力免之次早維那令堂司行者伺探方丈有暇即報求住人引到方丈通報排立寢堂候住持出問訊參頭進云請和尚趺坐各人進前插香初展云某等仰慕和尚道風特來依栖極荷收録下情不勝感激之至二展云即日共惟堂頭大和尚尊候動止多福大展三拜住持略答一拜求住人收具問訊而退次引至庫司諸頭首寮通門狀人事問訊略插香不受問訊講禮次各寮各齊人事堂司行者報云新歸堂人事今止傳語多不相接皆非禮也若舊識鄉曲次日一一重訪即歸下處伺頭首還禮或不回禮者非也參堂次早待木魚響時參頭領同歸堂衆右手入堂至聖僧前排立問訊參頭進前小問訊袖出香合右手拈香二炷轉身歸位同衆大展三拜參頭領衆到住持前排立問訊從首座板頭巡堂一匝自上堂至下堂次至外堂上下間問訊再回聖僧前問訊退就外堂隨衆喫粥下堂衆出同供頭入內堂認位掛鉢大名勝作住大方西堂名德首座欲作住計語次露意住持當尊賢重德當修治單寮躬自點示卓几床鋪什物完備別日會兩序勤舊茶住持躬起燒香復位立白云某處西堂首座不棄來此同守寂寥煩兩序勤舊同送歸某齊脫著受送人進前云宿生慶幸荷蒙收録同送至齊門住持先送入受送人揖住持歸主位問訊云云送住持出受送人轉居主位揖兩班入次勤舊入問訊送出即懷香詣方丈拜謝知客引詣庫司頭首寮勤舊處回禮別日方丈特為管待朔望請茶並同勤舊之列此據望重者之禮餘則量宣江湖名勝求住如欲求掛塔或次日赴茶罷就稟或別日粥罷特詣方丈稟云某等仰慕和尚道風持來依棲伏望收録住持如允則發榜頭煩首座請送則首座令堂司行者請受送人并知事一人維那侍者同至寮首座則燒香獻茶白云住持發批為某處某人遠來同守寂寥煩兩序同送歸齊送入齊時首座居主代住持問訊畢受送人歸主位首座轉居客位領知事維那同問訊畢懷香詣方丈拜謝次至首座庫司頭首勤舊處問訊若小剎歷聀者不在送例又當取其人材臨時審量耳遷齊方來兄弟既掛塔歸堂行禮已辦不宜久寓下處必遷齊舍脫著看讀寫遷齊狀詣堂司詳稟維那云云即撿齊舍簿或未遷齊或某齊人少相議酌量寫齊名標貼於狀上再稟維那備申即詣侍司侍者同上方丈呈狀住持題判發下堂司堂司行者關請錀起開齊門對簿交點什物卓凳牀具等頂若後請假亦須稟維那同堂司行者對簿交割什物完備方許給假近失點對使每年措辦有揖常住謝掛塔凡求住已定即謝掛塔如住持以禮繁待後來求住者一同謝掛塔如夏前歸堂者在四月八日謝如祖忌齊歸堂者在十一月二十日謝其戒臘在上者為參頭參頭當具小圖習儀三人一引每引一人為小參頭詳記詞語仍令堂司行者率各人香錢五伯文煩侍者到方丈回香約有幾引回香幾片就稟擬定何日謝掛塔至日侍者就寢堂設香几爐燭參頭領衆依圖列立參頭同侍者入請住持出歸位立參頭同衆齊問訊畢參頭進前稟云請和尚趺坐退右足側轉身於香几右邊空處出行過復位齊問訊畢參頭同本引三人問訊參頭進爐前小問訊懷中取香雙手插香右邊空處過復位三人同門訊展具住持展手約免之參頭進云某等宿生慶幸獲遂依棲下情不勝喜躍之至退歸位問訊再展具住持復約免收具再進前云即日時令謹時恭惟堂頭和尚尊候起居多福退歸位門訊觸禮三拜住持略答第一引問訊過左邊接班尾三三趲上插香詞禮並同禮畢普問訊而退次日方丈請點心請益凡欲請益住持須先詣侍司詳稟侍者咨覆住持如未允煩再三陳請如允次早粥罷各備大香一片詣方丈煩侍者通報行者裝香點燭請益人鴈立於爐前伺住持居中位坐問訊俱詣前插香退身大展九拜收具進前問訊云某等稟惟惟鈍入道無門伏望慈悲不倦提誨退身下首肅恭側立諦聽法誨如新學者兼誨以入衆規矩如問來歷從實稟答進前問訊而退次詣侍司拜謝或請益西堂都講首座則凂同門中一人預稟如允所請禮亦同前師當規以日課授文令其熟讀粥罷塔衣齊罷至夜亦頭持衣俱詣法堂朗誦毋使泛觀強記日富月貧當惜寸陰右則焚膏繼若久歷教庠專明於解未諳立行師當懸取止觀等文妙旨示之令其頓修佛乘依解立行若不觀心如貧數寶荊溪尊者云觀心乃是教行樞機當觀一念識心德量無邊體性常住諸佛衆生互攝無外如帝網之一珠影遍衆珠衆珠之影咸趣一珠現前一念亦復如是初心學者即以上品寂光而為觀體目足相資則涼池可到矣攝衆門第六
