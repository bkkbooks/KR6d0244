body:
  text: 天竺大圓覺教寺住持比丘自慶編述祝讚門第一普天之下莫非王土率土之濵莫非王臣自三公九卿百官以至於庶民皆有常職職不修而罰從之故不得不盡其職也況國家不以此責吾徒而優禮過之蓋尊其道而崇其教焉爾為吾徒者盍思所以報酬之道其於盛演宗猷陰翊王化當盡其職無或怠焉聖節欽遇萬壽聖節啓建金剛無量壽道場一月日既報洪恩禮加嚴肅僧員不許給假維那預令堂司行者覆庫司備榜紙疏紙仍預令詣書記寮行禮稟云啓建聖節請製疏語如書記缺或西班耆舊或維那自製不則用現成疏語見後製畢書疏維那帶行僕捧盤袱上方丈行禮請住持僉疏畢行者就覆住持來早啓建維那仍備榜張于山門之右榜疏並用黃紙書名別用紅紙製簿差僧上殿簿中並書雙字名先住持次兩班僧衆依其戒次量衆多少具寫差單排定日分周而復始至日各整威儀候鳴大鐘上殿至晚鳴大鐘下殿如有官員入山拈香鳴鐘集衆諷經祝讚是日住持若不升座只就大殿行祝讚禮若升座侍者先一日令堂司行者齊後僧堂前掛上堂牌仍覆兩班云來早方丈和尚升座次日五更開靜後鳴各處板三下衆坐堂待頭首入堂鳴僧堂鐘三下鳴大鐘後鳴法鼓住持出廳坐侍者行者隨出問訊分列側立燒香侍者即往法座左側立候衆入鼓轉第二通西班頭首出堂領大衆入法堂朝東序問訊至座前就西序立大衆鴈列于後參頭領衆行者出堂先列庫廳下對立亦候鼓轉第二通東班知事出庫廳衆行者問訊隨後入法堂朝西序問訊至座前就東序立行者退列于後留侍者位兩序相對略問訊侍者即回茶堂請住持住持候鼓轉三通起轎侍者後行至法座前冬月則去帽大衆亦去帽皆望塵問訊住持和南登座侍者側邊隨上法座以香合蓋盛片香捧上住持拈香祝壽畢侍者接香以雙手插爐中右手拈從香略問訊侍者下座住持趺坐侍者同事俱叉手出班小者先引過西近座前列一行對住持問訊畢燒香侍者引班合掌歸位東序後立次首座領同事叉手出班列香椅裏對住持問訊大衆同問訊畢首座引班合掌復位略問訊東序接問訊次知事俱叉手出班副寺先引至西邊列香椅裏對住持問訊衆行者隨問訊畢都寺引班合掌復位略問訊西序接問訊次東堂名德西堂出班列近座前對住持問訊畢侍者登座右手捧香合左手上香轉身向住持問訊謂之代衆請法退立座側住持執拂子揖衆講演云云畢座上回向云其月某日欽遇萬壽聖節某寺預於某月某日啓建金剛無量壽道場一月日逐日輪僧上殿披閲經文今辰開啓住持臣僧某升于此座講演妙義所集洪因端為祝延聖壽萬安結座畢白云大衆具威儀詣大佛殿啓建萬壽聖節謹白即鳴殿鐘住持領衆到殿上依次立定住持先燒香點茶上首知事遞上侍者下茶次行者鳴跋維那轉身爐前面外立揖香侍者捧香合住持上香次兩序叉手依次兩兩對出朝佛問訊上香畢復相朝轉身問訊歸位後東堂大西堂出班燒香歸位訖維那最後轉身問訊燒香歸位立首座舉南無無量壽佛衆和同展三拜為欣佛祝壽也畢衆收具住持不收具就跪知客跪進提爐侍者跪進香合住持燒香維那宣疏白佛云王中之王位列百王之上聖中之聖道逾千聖之前仰冀洪慈俯垂昭鑑今辰啓建萬壽聖節有疏云云疏式見後維那宣疏畢知客跪接提爐行者收具首座舉楞嚴呪行道呪畢首座舉無量壽佛號維那回向云仰冀洪慈再垂昭鑒啓建萬壽聖節諷演祕章稱揚聖號所集洪因端為祝延今上皇帝聖躬衆和萬歲萬歲萬萬歲祝陪天算無量壽佛十方三世一切諸佛一切云云滿散聖節亦如前住持如到公宇隨官祝讚首座偏位跪堂司行者跪進提爐座司茶頭跪進香合燒香宣疏畢堂司行者復跪接提爐佛降生與成道等日點茶出班燒香並同疏語教建疏首如前榜語書右伏以均天之大蕩蕩乎無能名焉與日竝明皓皓乎不可尚已戴德罔知高遠叨光莫喻照臨欲殫臣子之忠誠敢效華封之虔祝梵書五千卷演二十重華藏盡入提封妙旨六萬言會百億國小王咸歸至化少伸涓效上報洪恩恭願後天不老行地無疆壽舉玉巵翠蹕永朝於長樂功成丹鼎黃河屢見於清流謹疏某年某月日疏滿散疏右伏以天生聖人為天下生民之主國有大命在國家有道之歸唐虞雍熙文武兼濟踰萬年而得壽覆壽無私預一月以為期虔蘄有在恭願天之覆地之載配德惟均商尚質周尚文推功復倍效富壽多男之至祝衍蠻夷一統之不圖謹疏年月日疏每日祝讚大衆每日凌晨上殿侯立定先舉大悲呪一遍稱南無無量壽佛維那回向云仰冀洪慈俯垂洞鑒上來諷誦祕章稱揚聖號所萃洪因端為祝延今上皇帝聖壽萬安祝陪天算云云景命四齊日祝讚前一日晚堂司行者覆方丈兩班單寮挂牌次早殿鐘絶衆集舉無量壽呪或舉大悲呪或舉消災呪稱南無無量壽佛衆和三聲維那回向仰冀洪慈俯垂洞鑒四齊吉旦謹集臣僧恭趨寶殿諷演祕章稱揚聖號所集洪因端為祝延今上皇帝聖躬大衆同稱萬歲萬歲萬萬歲祝陪天算無量壽佛仁王菩薩摩訶薩云云若朔望隨日審改正月則云孟春餘月例知藏殿祝讚初八日二十三日此二齊日侵晨登殿祝讚粥罷鳴僧堂前鐘藏殿鳴鐘鼓令直藏殿人轉藏衆集首座舉楞嚴呪繞藏行道呪畢立定舉南無釋迦牟尼佛南無無量壽佛南無佛頂首楞嚴南無護法諸天菩薩衆各和三聲維那回向仰冀洪慈俯垂洞鑒四齊吉旦謹集僧衆恭趨藏殿運轉天宮法輪寶藏諷演祕章稱揚聖號所華洪因先為祝延今上皇帝聖壽萬安次冀佛日增輝法輪常轉無量壽佛仁王菩薩云云或無輪藏有實藏處亦宜行之但除運轉之語千秋節至期之前一日晚堂司行者覆方丈兩班單寮并挂牌次早登殿舉棱嚴呪維那白佛回向大圓滿覺應迹西乾身包太虗量周沙界仰冀洪慈俯某洞鑒某路某寺某月某日恭遇皇太子千秋令節謹集僧衆恭趨寶殿諷演祕章稱揚聖號所萃洪因仰祝皇太子睿算千秋殿下恭順祇膺茂典位副青宮溫文光三善之名繼照𭜴重離之慶十方三世一切云云善月正五九月為三長齊世稱善月每月建祈福道場先一日堂司行者覆住持兩班并挂善月牌於殿前具經單并置簿差僧每日鳴大鐘登殿看經祝讚至放鍾下殿終月列經目具疏滿散提爾經云諸天帝釋太子使者閻羅鬼神俱用正五九月旦日案行王民等為善惡者四時交代歲終三覆以校與四王一月六奏使無枉錯覆校衆生罪福作善降祥不善降殃自隨開皇三年詔天下正五九月及六齊日不得殺生命唐武德二年詔天下正五九月十齊日不得行刑屠釣逮今聖朝遵行尤篤各寺凡屆斯期毋或怠也世人以此三月忌上任者避行刑故耳祝讚門第一祈禳門第二佛以慈悲為化天以好生為德然而下民自孽致感失經背常之事吾徒當本國朝度僧之意為民祈禱宜加精恪昭回佛天慈好之心庶幾禍消未萌菑變為福其如是復何安居逸食之愧乎祈禱凡遇祈禱住持預集兩班茶議令庫司備辦供儀提調灑掃門徑廊廡嚴治壇場敷陳香燈花幡巡警大小寮舍齊潔復令頭首製疏意回向堂司行者挂牌報寮至日殿上營列供養住持專加虔謹僧衆各務整肅三日為期於齊粥二時鳴鐘集衆登殿諷誦祈禱初時首座舉南無過去正法明如來云云製語啓白舉大悲呪若干遍行道立定亟稱觀世音菩薩及護法諸天菩薩聖號和合十聲維那回向仰冀佛慈俯垂昭鑒某路某寺住持比丘某蓋為知如后各列復舉聖號和各十聲畢十方三世一切諸佛一切云云餘時舉唱回向同前但免啓白三日後如未蒙感格則以本寺僧衆若干員分作幾引每引諷呪若干遍稱號懇切祈禱如是相繼輪流不斷從朝至暮以感應為期兼復別修功果必期至效方可滿散懺謝如有灾異亟欲祈禱止如上規直通意旨啓白接官官員入山祈祝或先報至即令堂司行者覆住持兩班挂接官牌令人遠探候將及山門鳴鐘住持執提爐領衆門迎至殿拈香設拜知事當預問官御情旨轉達住持頭首知會慎不可忽舉呪稱號回向或住持或頭首不拘畢請歸方丈或法堂設位獻茶祇待如儀或遊覽陪從話語勿談世事或法門山門急務當量便申稟不可造次有傷大體去時鳴鐘大衆門送若迎送大官鳴樓鐘次則鳴僧堂前鐘祈晴無垢清淨光慧日破諸暗能伏災風火普明照世間霖雨不休萬物莫遂厥性陂塘欲決四民咸以為憂匪太陽照臨匿私實品彚業纍感召特伸祈懇望賜昭彰由是謹於某月某日啓建祈晴道場每日集衆諷誦祕章稱揚聖號功德祈禱常住三寶大悲觀世音菩薩奉福護法列席諸天帝釋尊天四門天王日宮大陽天子云云平等祈求乞彰感應伏願掃蕩陰霾俾式乾于后土豁舒杲日庶廓淨於天倪地利豐饒天時順序祈雨悲體戒雷震慈意妙大雲澍甘露法雨滅除煩惱焰水為物命豈勝爍石之威食是民天深切望霓之歎由下地同業所感非上天鑒物有偏欲遂濟通須憑祈扣由是謹於某月某日啓建祈雨道場每日集衆諷演祕章稱揚聖號功德祈禱云云奉福護教列席諸天五方行雨龍王六合雷公電姥風伯雨師雨部聖衆諸處溪源潭洞隱顯龍王嶽瀆山川靈壇社廟云云平等祈求乞彰感應伏願電掣雷匐起蛟龍於川澤雲行雨施蘇禾稼於田疇庶五之有秋俾四民之樂業祈雪冬令如春慮致下民瘴癘臘前未雪曷期來歲豐穰敬攄一衆之精誠願覩六華之祥瑞仰惟洪造俯賜詳明由是集衆諷誦祕章稱揚聖號功德祈禱常住二寶大慈觀世音菩薩奉福護法諸天帝釋尊天云云平等祈求乞彰感應伏願千里飛花平地瑞占於盈尺九秋多稔生民欣賀於有年藏伏祲氛導宣和氣救日纍德重光環四洲皆仰臨照行天失度極八方咸起震驚雖憑曆紀之推祥恐罹陰沴之厄數欲復金輪還瞻舊觀須依紺相曲示周旋輒啓祈禱用徇救護由是集衆諷誦祕章稱揚聖號祈禱常住三寶觀世音菩薩日光菩薩奉福護法諸天三界萬靈滿空聖衆平等祈求乞彰感應伏願光回宇宙氣協陰陽天下晏如豈用眩戈揮之伎太平有象孰須形盆覆之譏四方咸頌堯聲八表同光舜德救月大智精進佛世尊我今歸命稽首禮是羅候羅惱亂我類佛憐愍見救護蟾蜍屆望一輪正滿於茲宵羅彗肆妖全璧適虧於今夕故星紀躔入月紀乃天心警誡人心欲萬方重仰清光當此際合陳大造由是集衆諷誦祕章稱揚聖號功德祈禱常住三寶大悲觀世音菩薩月光菩薩奉福護法諸天權實真宰三界萬靈滿空聖衆平等祈求乞彰感應伏願冰輪完復不靳玉斧之修白兔重蘇還戢金罌之舊大地山河普照廣寒宮殿咸開萬象光昭九霄色正遣蝗飛蝗入境驚看蔽天遮野而來異物為灾寧免戕稼害禾之慘遺捕故憑於官守蹂踐何補於耕農敢仗妙用之功式畀祆禳之福由是謹於某月某日集衆諷誦祕章稱念聖號功德祈禱云云奉福護法列席諸天三界二儀滿空真宰陰陽造化賞罰聖賢云云平等祈求乞彰感應伏願慈風猛扇遣繩繩緝緝於無何有之鄉願海周流蕩蠢蠢蜚蜚於常寂滅之理非但遣一物之災抑將同六合以歡心謝晴靈耀宣光千里霽華開望眼蒼生仰德八紘晴色動歡心自非大道垂鑑之明曷覩大陽啓關之照復陳涓善敢答洪恩云云伏願求而輒應已占豐歲之嘉祥感而遂彰更卜秋田之刈穫陰陽順序民物阜康謝雨人或悖理兼旬驚旱魃之威天不遺民一雨慰桑林之澤憑茲優渥之潤頓濟發生之心既沐恩波敢忘隆德云云伏願八方稱賀人人懷擊壤之歌四海交歡處處期鼓腹之詠一味普益萬物增光祈禳門第二報本門第三法之為本至矣佛祖之道由是而生焉則凡有志於道者可不知其本哉一大藏教本衆生之性諸佛揭而示之諸祖對而揚之以文字廣第一義流行世間俾誦其書修其道者皆有以復性之本陟佛祖之階也然生死幻有之質推本於生成尚知所以報況誕育世出世無上法身者乎誠能以出世妙道誘掖庶彚盡復本性報本孰加焉又復國朝創業垂統先帝皆是果位應御天下大寶法王亦以大權輔化化事既終咸歸證地覃恩所被與教共隆而使吾徒究復本性得不追所自耶其於諱日拳拳懇懇思而敬之如來降生四月八日將屆降生住持專誠命庫司預備供養令行者於佛殿設毗藍園香湯盆安太子像置二小杓於盆內至日敷陳供養併香湯畢堂司行者覆打起大衆各具威儀備香湯錢候鐘聲俱詣大殿依次立住持上香三拜不收坐具進前奉湯食行者遞上侍者捧置于几問訊畢復位三拜再上香下䞋點茶又三拜收具兩序出班維那揖香如前式大衆三拜收具住持跪爐維那宣疏白佛云現大人相充滿太虗深遠雷音遍周法界巍巍乎高等須彌晃晃乎明逾日月云云疏式見後維那宣疏畢首座舉唱浴佛偈云我今灌沐諸如來淨智莊嚴功德聚五濁衆生令離垢同證如來淨法身行道浴佛畢立定舉安樂行復行道經畢復舉佛號各三聲畢大衆云願滅三障諸煩惱願得智慧真明了普願罪障悉消除世世常行菩薩道十方三世云云疏式某路某寺住持末裔比丘某與衆小比丘等四月初八日恭遇本師釋迦如來大和尚降生之辰謹備山殽野蔌茗碗爐熏專伸供養諷誦經文稱揚聖號所集功德用酬慈蔭者右伏以千聖嗣興莫不由實道而成正覺一法可讚所謂以慈心而遊世間既膺人壽百歲之時遂補賢劫四佛之處取萬二千國中央之地示三十二相劣應之身固敢為天下先而自稱人中勝豈羡繼天之貴蓋昭唯佛之尊應迹如存仰明星而猶朗化儀雖往想白虹而尚騰適逢賜影之辰少效惟馨之薦奉匜香水用沐金軀集茲有作之熏仰報難思之德本師釋迦如來大和尚伏願彌隆至化闡宗風復振皇風未喪斯文寢邪法流通正法罄有相證諸相非相之實相統含生悟無生受生之真生等未來時如出興日謹疏如來成道臘月八日禮式同上但去浴佛偈耳非證而證久證於塵點劫前無成故成近成於菩提樹下蓋從本而垂迹為行已而化他降靈於覩史陀宮利見於迦維衛國視金輪而脫屣指雪山為故家分衛五人燕坐六載隨機時有賖促豈證道過當雲散儀霄自爾水月交際春回嶰谷不妨花柳芬菲念化儀無得而稱惟內證尤不可示熟前番人雖云已矣愍末裔者其如之何歆艷遺音𪫟惕罔措伏願俾末世優曇再瑞復覩明星使澆季甘蔗重榮還瞻慧日如來涅槃二月望日鐙夕後住持令堂司行者報示新學熟讀遺教經五日一次詣首座前背試至二月初一日為始每日齊了堂司行者覆打起集衆詣佛殿諷誦淨覺法師有禮文四明延慶至日皆如天台祖忌行之於法堂上置涅槃佛像左右敘列涅槃會上結集諸法藏結集諸菩薩僧結集緣覺僧結集聲聞僧四位牌銜配之近來諸方從簡就佛殿上食設拜而已豈盡報本之誠乎疏語鷲嶽膺期顯一乘而極唱鶴林顧命指三德以真歸自高山先照示以出興至峻嶺餘輝云當入寂知唱生而唱滅恆常不變法性本然見令始而令終會必有離世相如是醫師背喪賈客他行花柳無私俄洊逢於遠日蘋蘩可薦罔敢墜於遺風式表芹誠仰祈藻鑑伏願分身俯降護身使佩於靈符慧命長存贖命見頒於重寶庶令後裔克紹先宗國忌上賓日屆期先一日晚庫司令堂司行者覆住持兩班挂諷經牌報衆就法座上安御座用黃紙書聖號牌位嚴設香華燈燭供養之儀至期鳴僧堂前鐘集衆住持上湯茶首座舉棱嚴呪呪畢舉釋迦楞嚴諸天號維那回向云天上天下聖主為尊世出世間法王自在仰冀洪慈俯埀昭鑑某路某寺住持傳教觀僧某今月某日恭遇某聖聖忌之辰謹集僧衆諷誦祕章稱揚聖號所集殊𬊫上資聖駕供願逍遙八極仰翠輿玉輅之來儀自在中天享瑤關瓊臺之娛樂十方三世云云天台大師忌十一月二十四日維那和會禮數與說戒同將屆忌辰住持專誠命庫司備供養之儀維那預先和會人借書畫器皿分項掌管復和會唱禮人員三夜習儀方丈初夜庫司次夜堂司後夜務盡孝思毋或叨餮也宿夜日參頭差行者於法堂敷陳玩具嚴飾祭筵爐瓶香几一一如儀上間設法衣拂子椸架椅等中間分列九祖山家諸祖山門始祖并嗣法師等位仍設祭筵下間設部文爐瓶椅等當晚堂司行者覆方丈兩班打起鳴僧堂前鐘集衆侯住持至各去帽頭首舉南無旋陀羅尼菩薩右旋行香一匝各歸蒲團位展具三拜默運香華散華畢依懺主禮文專誠修禮候奉請時住持起上湯茶正日上湯食䞋茶侍者一一恭進奉請後仍請山家諸祖山門始祖等及嗣法師請畢讚嘆宿夜正日維那讀疏或知客讀疏式見後前後堂首座繳疏宿夜唱誦前六段頂禮正日唱誦後六段頂禮仍頂禮列祖畢懺五悔訖設三拜頭首舉安樂行行道經畢舉佛號畢衆云願滅三障諸煩惱云云堂司行者唱云知客請方丈和尚兩班大衆就此獻湯湯畢維那備湯果或請大衆或但請唱禮人隨山門例不同次行堂參頭領衆詣筵諷經正日辰時常住點心堂司行者打起唱禮諷經與宿夜同至午時大衆起堂齊維那請唱禮提調等人就寮齊齊粥畢堂司行者就僧堂覆住持兩班鳴僧堂前鐘詣供筵諷經畢行者諷經候禮時首座居中左右各三人互相同聲奉請有聲音者一人唱序知客去帽燒香下湯維那湯果亦然疏語古塔開扉半座平分風月靈山在目三周俱付筌蹄摧我慢自高之幢示吾今親證之地陳隋應運蠻貊同文小根小莖毋望洋向若而嘆大枝大葉皆拔茆連茄而征衆丘繞司命遜其高寒諸子駕安車鞭其觳觫生民以來未有愈高泰山北斗之具瞻此舟過後更無益重浮木盲龜之難值玄珠休景智鑑沉光攪和酥酪之既成收卷波瀾而遐舉象武方絶塵於無何有鄭聲將亂雅於侏離淫允賴正音洗空邪說謬記刻舟之蹟輒營諱日之齊擷芳於沼沚之毛式資明信展敬於涓埃之效允答洪休法空寶覺智者大禪師伏願有伴即來招手勿忘於金地如月初上分身豈間於潢流再振玄猷庶昌厥後又疏鈞天韶護合吾節乃張鳳凰麒麟適其時則出會斯文之將喪故亞聖之倔興恭惟天台教主法空寶覺智者大禪師豁見靈山洗虞困之佛日大訇木鐸鼓震旦之金聲貫一乘極唱之音洞三際終窮之妙午照揭矣容魚目之奪珠大道廓如空鄭聲之亂雅簾月柏香而真法供養江陵金地而順物委蛇獲一旋陀羅尼姑示迹中之迹想三阿僧祇劫已極天中之天香風吹優曇鉢華鐵鼓透那羅延箭挹玉泉之源渺霈一雨於夢中仰華頂之峯高降衆魔於鏡裏至若帝王師法凡聖奉尊皆吾祖之緒餘奚下凡之足議某等忝值示歸雙樹逮至千年雲仍近百世之孫傳續愧一絲之眇魂搖鯨海空懷四帝之雄姿恩戴鰲山莫覩二嚴之奇相望江聲而動哭瞻斗氣以凝悲輒陳寒㵎之蘋聊奉惟馨之薦嗚呼我祖罔極蒼天伏願下印千江彌滿一天之月究竟六味吹噓九地之春矜氛埃轇轕之秋哀敗種離披之極藥垂瞑眩不舉步而悟故鄉跡免竛竮即此心而見真性誓報難明之化洞然無盡之燈諸祖忌章安尊者八月初七日忌荊溪尊者二月初五忌四明尊者正月初五日忌山家諸祖忌辰宜皆修敬而於天台忌辰夾祀禮也章安結集荊溪記述四明中興此三祖之功大於名教故當表而出之屆期別祀亦禮也凡臨忌辰維那預令堂司行者覆方丈兩班挂牌報衆庫司辦供儀隔宿於法座上挂真真缺設牌至日敷陳供儀堂司行者覆方丈兩班鳴廊板僧堂前鐘集衆候住持至不得覆𮔙鳴引二下首座舉南無某祖師菩薩領衆右旋燒香一匝立定住持上香三拜不收坐具進爐前上湯上食侍者恭遞俟捧至几上退就位三拜仍進前燒香上䞋猷茶畢復位三拜收坐具住持上片香行者鳴行香鈸維那出班揖香兩序出班上香式如前大衆同展三拜住持跪爐維那宣疏仰冀真慈俯垂洞鑒云云疏語如后畢首座舉安樂行如前式若行宿禮亦如之但免出班上食而已章安尊者忌疏得高忘筌能即言說而為解脫示月須指故因文字以顯總持慮衡台過後以無聞故荊揚住來而不憚殆可慶喜同功並德斯與智者默識心通恭惟天台寶授結集法藏章安禪師總持尊者佩宿誓而復來稟今師而善繼捷五行於目視記萬言於耳聞由自任天下之難故超出門人之上菜食水齊氷牀雪被不辭著述之勞超雲邁印跨朗籠基豈圖講說之勝悲斯文之若墜示甘露之在茲東宮之法斾方還內院之寶臺已待某等叨生法末獲奉圓聞俄諱日之來臨痛深恩而罔報聊伸菲供少展涓誠伏願再降攝靜白日羣雄不勞彈指重復回瀾青氈舊物竚聽咳聲庶大教振開皇之風俾末裔覩江陵之盛荊溪尊者忌疏或蕩於空或膠於有捨哲匠誰其正諸既衷以理既闢以文𮨇圓宗巍然存矣符掖輪遊河之夢專尊王賤伯之功記諸部于台嶺毗壇數十萬言雲垂海立來多士於吳門楚甸幾千百衆鳳翥龍翔辭優詔以深藏挈宏綱而獨任天扶杞國日取虞淵台衡教觀於是重明靈嶽箕裘宜其遠紹某等濫同展卷實切銜恩適逢諱日於花朝聊陳薄供遙想靈龕於佛隴莫覩真容天台記主荊溪大師圓通尊者伏願悲誓所薰即文字廣第一義遺編是賴期自他入不二門永俾邪徒咸歸正說四明尊者忌疏聖祖往而玄化微懍若縣𮈔之引石邪說行而間世出明如杲日之旋空豈唯爝火之息哉宜載曇華之現耳恭惟中興教觀法智大師四明尊者幼生鄞水神僧遺佛子之靈初稟寶雲彌月講心經之要遂作學徒淵藪真成法海舟航鼓吹一乘網羅衆典行天台難行之行脅不至席四十餘年記毗陵未記之文手不停書幾千萬字青襟蟻集赤幟雲張中興教觀舍師其誰遠紹箕裘一人而已何鶴林之變色致梁木之纏悲空抱遺編難回寂定某等痛適臨於諱日實常感於深恩薄薦蘋蘩少酬埃滴伏類不忘冥護永俾弘傳講貫連環同淳化天禧之歲行門啓鑰追乾符保恩之時重振斯文益昌厥後開山歷代祖忌開山祖若法門重望功被山門宜如前諸祖設法堂上禮儀亦須製疏贊其功德若歷代忌屆期堂司行者預報庫司備供養請祖堂位牌就法堂中間鋪設粥罷集衆住持兩序一行排立住持上香湯食茶畢大展三拜首座舉阿彌陀經行道經終稱聖號彌陀觀音勢至等維那回向因緣所生法我說即是空亦名為假名亦名中道義仰冀真慈俯垂昭鑑今月某日山門伏值前住當山第幾代某祖師齊忌之辰營備菲儀以伸供養謹集比丘衆諷誦真乘稱𫾻聖號功德奉為覺靈增崇品位伏願十乘齊䇿優游即入清涼池三觀彌修任運同歸祕密藏再回寂定重輝法燈云云或徒弟法眷江湖道舊俵䞋請衆諷經維那回向仰冀真慈俯垂照鑒徒弟比丘某等伏值前住當山先師和尚某法師齊忌之辰謹命同袍諷誦真乘稱揚聖號云云若就祖堂下食一位諷經非禮也嗣法師忌嗣法師者傳道解惑授受之際得益非少當知根源凡遇忌辰禮宜盡誠須預計算合用製供錢物歸常住置食設供或自就方丈營辦隔宿令堂司行者覆兩班報寮法堂上鋪陳祭筵玩具法座上挂真宿夜集衆諷經至日粥罷鳴堂鐘集衆對座鴈立住持上香上湯三拜又上食上䞋三拜上茶又三拜大衆同三拜蓋在座下皆曰參學故尊住持也今諸方衆中或不拜者有之維那宣疏或住持敘意親製或書狀侍者製首座舉經領衆行道住持則侍立座左經畢舉佛號衆云願滅三障云云次行者諷經宿夜同齊時住持入堂燒香大展三拜以答衆禮也歸位侍者行䞋當晚就方丈備湯果請兩班江湖道舊須令客頭行者預請法眷俵䞋諷經如前檀越忌隔宿堂司行者覆方丈兩班掛牌庫司預專人詣檀越家請子孫到寺拈香量宜迎接復講供儀至日就祠堂敷設子孫至山已集衆住持上香首坐舉彌陀經稱號維那回向真如界內絶生佛之假名平等性中無自他之形相仰冀神儀俯回昭鑒今月某日山門伏值故檀越某人稱呼遠忌之辰營備菲儀以伸供養仍集合山大衆諷誦真乘稱念覺號灼化財功德專為神魂莊嚴報地伏願心遊妙理質托淨邦香風起處聞經蓮華開時見佛化紙誦往生呪三遍畢十方三世云云報本門第三住持門第四夫我能仁之制三月遷居八穢靡畜樹石田里皆許宣通四事供輸十方應慕雖有伽藍不居常産無有住持之云也教流震旦官以九司官舍謂有法度之處名之曰寺遂名僧舍以安其衆必擇齒德兩尊為衆範模者而統領之始有住持之稱焉至今國朝慎選舉其德行可以服衆言論可以警世然後舉而任之苟其材德不稱雖耆耄不與焉故凡登其選者操大法之柄誕敷聖言啓迪後學昌法運於像季惠生民於塵剎乃所以裨王化光世教也豈貪位苟祿所足尚哉其或行不備德不掩負且乘覆公餗者厥惟艱哉議舉住持主席之位不宜久虗兩序勤舊先就庫司會茶議定具呈宗主三宗諸山知會約日本寺大衆江湖名勝公同保選履踐端正學識高明允合輿論廝次相應堪服衆望者准使院通例十名鬮三名然後填僉勘合申院凡諸山知事勤舊不可以鄉人法眷私情賄賂不擇臧否以玷教門近代以來樹黨徇私德不稱位寺院廢弛宗風不競蓋由此焉戒慎惟謹公保既定兩班耆舊諸山繼時先僉草榆請新住持凡十件發專使院堂鬮拈既定伺公帖下日都寺往首座寮斟酌專使次日庫司會兩班勤舊茶都寺燒香歸位白云卜選住持某日入院今請某某為專使白畢轉椅燒香獻湯至晚管待專使商議差能事行者老郎預通書次擇人製山門疏茶湯榜榜用絹素修廣如法為專使者西序中或首座至維那或西堂或勤舊必須知事一人同去掌財議事具寫本寺所有産業什物須知迎接儀從一切必具起程之日專使詣諸寮相別鳴僧堂前鐘集衆相送三門釘挂帳設面裏設特位兩序勤舊光伴講茶湯禮如上首知事去則下首知事行禮如頭首勤舊去則上首知事行禮揖座燒香歸位相伴喫茶再起燒香對專使揖香歸位相伴喫湯專使起謝而去專使到彼山專使至彼已先訪知客同到庫司相見畢送客位安置行李繼訪侍者通覆住持如蒙允請令敷設卓安疏帖報兩序至住持出接專使問訊請趺坐住持中立專使插香初展云某蒙山門使令攀屈尊嚴獲奉慈顏下情不勝威激之至二展云即日共惟新命堂頭和尚尊候動止多福三大展三拜住持答一拜某自揆疏謬難膺此請盛禮過厪不勝皇媟專使捧呈疏帖住持受左右進卓置几上看過侍者揖專使坐兩班光伴首坐分手專使面住持坐侍者燒香獻茶同來行僕參拜畢兩班送專使歸安下畢住持即遠禮回方丈堂司行者鳴僧堂前鐘兩班同大衆詣方丈禮賀衆散知客領專使巡寮畢再詣方丈呈納本寺須知儀什物當晚特為專使藥石至夜湯果皆請大耆舊兩序光伴庫司營辦專使特為新命煎點專使先與新命議定齊䞋輕重兩序勤舊鄉人法眷辦事貼䞋齊料等費專使親送鈔納庫司置辦至日專使詣方丈插香拜請初展云今辰午刻就雲堂特為煎點伏望慈悲降重下情不勝戰汗之至再展云即日如前三觸禮住持曲身略答令方丈請客行者同專使行者稟請兩班大耆舊挂煎點牌報衆於僧堂內敷設主席位於知客板頭設專使位至齊時專使僧堂前候住持入堂問訊歸位揖坐歸中問訊揖衆坐聖僧前燒香次上下間次堂外燒香歸堂內住持前上下間次堂外問訊仍歸中間問訊退側少立候行食遍再燒香下住持䞋并兩序勤舊大衆䞋畢歸位伴齊俟折水出鳴鼓專使再起燒香行禮同前行茶遍如前問訊收住持盞專使行禮初展云某聊備疏飯伏蒙慈悲降重下情不勝感激之至再展敘寒溫三觸禮送住持出再歸堂燒香大展三拜巡堂一匝并外堂復歸內堂中間問訊收盞鳴鐘三下衆退專使繼上方丈致謝次詣庫司謝辦齊再詣方丈請住持至晚藥石至夜湯果皆請兩序勤舊光伴山門管待住持并專使庫司會議管待先一日上首知事詣住持前插香拜請次詣客位稟請專使令庫司客頭請兩序勤舊光伴備幣䞋當如禮不可輕蔑詞語行禮並與特為禮同寢堂中敷住持高座設專使兩序等位如後式同來僕從遠接者管待外當別犒勞山門管待新命設中位專使面坐若住持特為專使則與首座分手不居中位新命辭衆上堂茶湯至起程日專使詣諸寮相別新命上堂致謝兩序勤舊大衆法語下座親往鳴鼓三下向法座立普與大衆問訊從西廊出鳴大鐘諸法器大衆門送行僕門外排立山門釘挂帳設中敷高座向內首座向外攝居主位西堂勤舊分手光伴東西序兩邊朝坐上首知事行禮揖坐揖香歸位點茶收盞再起燒香揖香歸位點湯湯罷起謝上轎兩序勤舊備轎遠送住持當力免之鳴大鐘住持轎遠方止凡住持多因遷赴他山僧行懷其宿憾輒致唇吻傳之官員士庶因一人無知而使一寺蒙其惡名老成耆宿外護鄰封當戒戢之然為住持者凡事留遺愛可也西堂頭首受請專使到寺先訪知客問訊略露請意知客先令人到所請人寮使備接專使少頃用拌袱盛書疏帖同知客詣所請人寮插香行禮如請當代禮同畢受請人就委知客同專使上方丈行禮稟云今某寺請某人為住持禮畢繼往諸寮庫司人事回寮所請人送專使安下處歇息至晚請湯果兩班光伴次日方丈報兩序并耆舊同往所請人寮作賀次第受賀訖巡寮人事當晚方丈請新命專使湯果藥石兩班相伴專使特為受請新命煎點專使預送錢到庫司備辦煎點仍詣新命前議定方丈䞋并兩序勤舊江湖名勝鄉人法眷等貼䞋至日粥罷專使懷香詣方丈觸禮拜請今晨午刻就雲堂聊備蔬飯特為新命和尚伏望慈悲特垂降重復詣新命前拜請同前禮方丈客頭同專使行者請諸寮掛煎點牌於僧堂內住持對面設新命位外堂知客板頭設專使位位持預分付請客行者將至齊時先請新命到方丈少坐俟鳴板僧衆入堂專使詣方丈請住持并新命同赴堂專使隨入堂先揖住持歸位次揖新命歸位次歸中問訊揖衆坐進爐前燒香右手執合左手上香左轉身先到住持前問訊再燒香到新命前問訊餘禮同前下食行䞋茶畢先收住持盞專使至住持前初展云某聊備蔬飯伏蒙和尚降重下情不勝感激之至再展云云三觸禮住持略答專使送住持出外堂中間再回堂內又收新命盞專使至新命前二展詞語如前三觸禮新命略答送新命出專使再回堂內燒香大展三拜巡堂一匝并外堂歸中問訊謝大衆收盞鳴鐘三下出堂專使上方丈謝住持次謝新命次謝庫司辦齊復請住持并新命至晚藥石至夜湯果皆請兩班勤舊光伴斯蓋古禮當力舉行近多泛簡俵䞋而已付承嗣法衣佛祖傳付心心相照師資授受啐同時靈山得記之儔皆傳如來教觀但緣興在迦葉故付別指一人金口祖承二十三傳而至師子而我二祖北齊悟大論三智一心中得遠承龍樹以授南嶽天台初見南嶽為說四安樂行以教研心妙悟三昧繼繼承承餘輝殘照以至于今故知所傳教與觀也衣之所傳蓋表信耳嗟乎流習之弊忘本逐末懵然不知承嗣者何事曰師曰弟子是亦可羞也夫若新命嗣法於師先與師之心腹人吐露其意請求法衣受衣日恭詣師寢堂師乃當中趺坐略伸警䇿之語付衣新命即抽故衣披法衣對師大展九拜而退當日請新命齊下䞋是晚藥石並請法眷光伴山門管待受請人并專使隔宿先令請客侍者詣新命寮請新命專使次日就寢堂對中面裡設新命位左右設專使位兩序勤舊光伴燒香下䞋等燒香侍者行禮如常式受請人辭衆新命臨行之日粥罷同專使上方丈插香拜辭次詣庫司諸寮辭別庫司預令人山門首釘挂帳設敷位鳴大鐘集衆相送講茶湯禮上首知事燒香行禮與當代同若名德尊宿大西堂首座則住持必須升座新命亦須隔宿令侍者同事使懷香詣方丈觸禮稟借法座次日粥罷於法座對面設新命位座左亦設住持位鳴鼓集衆住持升座令侍者請新命坐雖請亦不可據坐有妨大衆故也讚美新命之德為法而出勸請舉揚慰衆渴仰法語下座古人有引座之法即此謂也住持歸座左向外而立專使同侍者至新命前問訊畢新命出住持前問訊次與兩序大衆問訊升座舉揚敘謝結座下座詣住持前觸禮三拜次向法座立辭大衆普同觸禮三拜從西廊出衆送門首行茶湯禮如前新住持入院凡一十件入院若古法入院腰包頂笠至山門首下笠炷香有法語就僧堂前解包屏處濯足取衣披搭入僧堂炷香聖僧前大展三拜參隨人同拜掛搭已到佛殿拈香有法語大展三拜次土地堂祖堂炷香各有法語入方丈據室有法語次拜堂祝聖此是古法也今則少有行之新命到來當看甚處安下近則衆往祇迎遠則兩序勤舊而已住持令專使預報免衆遠迎若安下處近當辦湯果兩序勤舊光伴依選定日辰入院庫司令執局人隔宿排辦掛接住持牌報衆至時鳴大鐘諸法器大衆門迎兩行排立行僕立大衆外新命到門燒香轉身立定舉法語直入大殿燒香舉法語大展三拜鳴僧堂前鐘大衆先歸鉢位立新命入堂聖僧前燒香大展三拜參隨人同拜維那至住持前問訊引巡堂一匝兩序送新命歸鉢位觸禮一拜或新命曾於本山辦事不巡堂次至土地堂祖堂燒香各有法語至方丈據室侍者進前炷香問訊側立伺舉法語畢行者進卓筆硯知事具狀見後備柈袱捧呈寺印新命看封付知事開封新命視篆訖就狀上先花押次題日子使印於上知事收狀衣鉢侍者收印退卓住持起立知事全班進列香椅前上首插香同兩展三禮初展云茲者伏蒙和上光鎮法班山門不勝榮幸再展云即日時令謹時共惟新命堂頭大和尚尊候起居多福三觸禮次頭首勤舊進前插香香不受諸山等屮賀畢客頭行者喝云請諸山堂頭和上兩班耆舊就座獻湯湯畢請官客諸山點心若前代住持別遷未赴或退居東堂未據室前講交代禮新命受屮賀了鳴僧堂前鐘領衆躬送前代歸寮對觸禮一拜次兩班大衆作賀東堂歸寮次行僕皆當參拜山門請新命齊上首知事候據室後人事稍畢備袢袱爐燭具狀式見後懷香詣方丈請齊兩展三禮初展云午刻就雲堂備蔬飯祇迎伏望慈悲特垂降重下情不勝戰汗之至再展敘寒溫三觸禮住持略答知事呈狀方丈客頭收狀庫司客頭鋪設僧堂內住持位知事行禮與特為管待同開堂祝壽古之輦下列剎朝廷差官馳命敦請或部使者或郡縣遣弊禮請就某寺或本寺官給錢料設齊開堂各官自有請疏及茶湯等榜見諸名公文集近來開堂各寺自備至時入院侍者分付行者鋪設法座覆諸寮掛上堂牌具寫官員諸山名目預呈住持於座左設位鋪卓衣袱爐燭排列疏帖預先和會維那宣公文首座宣山門疏以次頭首或諸山江湖名勝宣其餘疏知事預請上首諸山住持一員白椎座前對面排官員位侍者覆方丈鳴鼓衆集侍者同專使入請住持出鐃鈸幡華桃燈迎引至法堂主位鋪設處立如受請時未拈衣抽衣舉法語披法衣畢專使進前插香行禮初展云伏蒙和尚光據法筵下情不勝